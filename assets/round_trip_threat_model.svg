<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-out" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0366d6"/>
    </marker>
    <marker id="arrow-in" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0366d6"/>
    </marker>
    <marker id="arrow-internal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#586069"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="780" fill="#fafbfc"/>

  <!-- ===== Title ===== -->
  <text x="40" y="44" font-size="22" font-weight="700" fill="#24292e">Round-trip threat model — pseudonymise locally, restore locally</text>
  <text x="40" y="68" font-size="13" fill="#586069">Real client names never cross the trust boundary. The vault stays at the firm.</text>

  <!-- ===== Lane headers ===== -->
  <rect x="40" y="100" width="560" height="40" rx="6" fill="#e6f6ec" stroke="#2ea44f" stroke-width="1.5"/>
  <text x="320" y="125" font-size="14" font-weight="700" text-anchor="middle" fill="#1a7f37">FIRM'S NETWORK  ·  TRUSTED</text>

  <rect x="640" y="100" width="520" height="40" rx="6" fill="#ffebe9" stroke="#d73a49" stroke-width="1.5"/>
  <text x="900" y="125" font-size="14" font-weight="700" text-anchor="middle" fill="#b62324">LLM PROVIDER  ·  UNTRUSTED</text>

  <!-- ===== Trust boundary (vertical dashed line) ===== -->
  <line x1="620" y1="155" x2="620" y2="720" stroke="#d73a49" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="620" y="175" font-size="11" font-weight="700" text-anchor="middle" fill="#d73a49">TRUST BOUNDARY</text>
  <text x="620" y="190" font-size="9" text-anchor="middle" fill="#586069" font-style="italic">nothing identifying crosses this line</text>

  <!-- ===== Step 1: Document with names (Firm) ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="200" width="260" height="86" rx="10" fill="#ffffff" stroke="#d1d5da" stroke-width="1.5"/>
    <text x="80" y="222" font-size="11" font-weight="700" fill="#0366d6">① ORIGINAL DOCUMENT</text>
    <text x="80" y="246" font-size="11" font-family="ui-monospace, monospace" fill="#24292e">"Maria Petrova sued John Doe</text>
    <text x="80" y="262" font-size="11" font-family="ui-monospace, monospace" fill="#24292e">over breach of the Acme</text>
    <text x="80" y="278" font-size="11" font-family="ui-monospace, monospace" fill="#24292e">contract in 2024."</text>
  </g>

  <!-- Down arrow -->
  <line x1="190" y1="290" x2="190" y2="312" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow-internal)"/>

  <!-- ===== Step 2: Pipeline ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="316" width="500" height="118" rx="10" fill="#f1f8ff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="80" y="338" font-size="11" font-weight="700" fill="#0366d6">② ANONYMISATION PIPELINE  ·  runs locally, no network calls</text>
    <text x="80" y="361" font-size="11" fill="#24292e">• Detect spans (NER + regex + coref)</text>
    <text x="80" y="379" font-size="11" fill="#24292e">• Classify role (DIRECT / QUASI)</text>
    <text x="80" y="397" font-size="11" fill="#24292e">• Suppress DIRECTs → assign referential tokens</text>
    <text x="80" y="415" font-size="11" fill="#24292e">• Build vault: <tspan font-family="ui-monospace, monospace" fill="#0366d6">{PERSON_A: "Maria Petrova", PERSON_B: "John Doe", ORG_A: "Acme"}</tspan></text>
  </g>

  <!-- Down arrow split -->
  <line x1="190" y1="438" x2="190" y2="460" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow-internal)"/>
  <line x1="450" y1="438" x2="450" y2="460" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow-internal)"/>

  <!-- ===== Step 3a: Tokenised output ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="464" width="260" height="92" rx="10" fill="#ffffff" stroke="#d1d5da" stroke-width="1.5"/>
    <text x="80" y="486" font-size="11" font-weight="700" fill="#0366d6">③a TOKENISED DOC  +  question</text>
    <text x="80" y="510" font-size="10.5" font-family="ui-monospace, monospace" fill="#24292e">"[PERSON_A] sued [PERSON_B]</text>
    <text x="80" y="526" font-size="10.5" font-family="ui-monospace, monospace" fill="#24292e">over the [ORG_A] contract</text>
    <text x="80" y="542" font-size="10.5" font-family="ui-monospace, monospace" fill="#24292e">in 2024."</text>
  </g>

  <!-- ===== Step 3b: Vault ===== -->
  <g filter="url(#shadow)">
    <rect x="340" y="464" width="220" height="92" rx="10" fill="#fff5b1" stroke="#735c0f" stroke-width="2"/>
    <text x="360" y="486" font-size="11" font-weight="700" fill="#735c0f">③b VAULT</text>
    <text x="450" y="486" font-size="9" fill="#735c0f" font-weight="700" text-anchor="end" transform="translate(540,0)">🔒  SECRET · stays local</text>
    <text x="360" y="510" font-size="10.5" font-family="ui-monospace, monospace" fill="#735c0f">PERSON_A → Maria Petrova</text>
    <text x="360" y="526" font-size="10.5" font-family="ui-monospace, monospace" fill="#735c0f">PERSON_B → John Doe</text>
    <text x="360" y="542" font-size="10.5" font-family="ui-monospace, monospace" fill="#735c0f">ORG_A    → Acme</text>
  </g>

  <!-- arrow Step 3a → LLM (crosses trust boundary) -->
  <line x1="320" y1="510" x2="700" y2="270" stroke="#0366d6" stroke-width="2.5" marker-end="url(#arrow-out)"/>
  <rect x="430" y="378" width="170" height="44" rx="6" fill="#ffffff" stroke="#0366d6" stroke-width="1" opacity="0.95"/>
  <text x="515" y="395" font-size="10.5" font-weight="700" text-anchor="middle" fill="#0366d6">④ SEND OVER NETWORK</text>
  <text x="515" y="412" font-size="9.5" text-anchor="middle" fill="#586069" font-style="italic">opaque tokens only · no real names</text>

  <!-- ===== Step 5: LLM provider sees ===== -->
  <g filter="url(#shadow)">
    <rect x="660" y="220" width="480" height="108" rx="10" fill="#ffebe9" stroke="#d73a49" stroke-width="1.5"/>
    <text x="680" y="242" font-size="11" font-weight="700" fill="#b62324">⑤ WHAT THE LLM PROVIDER SEES</text>
    <text x="680" y="266" font-size="10.5" font-family="ui-monospace, monospace" fill="#24292e">Prompt: "[PERSON_A] sued [PERSON_B] over the [ORG_A]</text>
    <text x="680" y="282" font-size="10.5" font-family="ui-monospace, monospace" fill="#24292e">         contract in 2024. Who is the plaintiff?"</text>
    <text x="680" y="306" font-size="10" fill="#586069" font-style="italic">Logged, retained, possibly used for training — but contains</text>
    <text x="680" y="319" font-size="10" fill="#586069" font-style="italic">no client-identifying information.</text>
  </g>

  <!-- LLM runs -->
  <g filter="url(#shadow)">
    <rect x="780" y="350" width="240" height="50" rx="25" fill="#ffffff" stroke="#586069" stroke-width="1.5"/>
    <text x="900" y="380" font-size="12" font-weight="700" text-anchor="middle" fill="#24292e">⑥ LLM inference</text>
  </g>

  <!-- Response from LLM (still tokens) -->
  <g filter="url(#shadow)">
    <rect x="660" y="420" width="480" height="80" rx="10" fill="#ffebe9" stroke="#d73a49" stroke-width="1.5"/>
    <text x="680" y="442" font-size="11" font-weight="700" fill="#b62324">⑦ LLM RESPONSE  ·  still in tokens</text>
    <text x="680" y="466" font-size="10.5" font-family="ui-monospace, monospace" fill="#24292e">"[PERSON_A] is the plaintiff;</text>
    <text x="680" y="482" font-size="10.5" font-family="ui-monospace, monospace" fill="#24292e"> [ORG_A] is the contract counterparty."</text>
  </g>

  <!-- arrow LLM → restore (crosses back) -->
  <line x1="700" y1="500" x2="320" y2="600" stroke="#0366d6" stroke-width="2.5" marker-end="url(#arrow-in)"/>
  <rect x="380" y="528" width="180" height="44" rx="6" fill="#ffffff" stroke="#0366d6" stroke-width="1" opacity="0.95"/>
  <text x="470" y="545" font-size="10.5" font-weight="700" text-anchor="middle" fill="#0366d6">⑧ RESPONSE BACK</text>
  <text x="470" y="562" font-size="9.5" text-anchor="middle" fill="#586069" font-style="italic">still no real names</text>

  <!-- ===== Step 9: restore() ===== -->
  <g filter="url(#shadow)">
    <rect x="60" y="590" width="260" height="86" rx="10" fill="#f1f8ff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="80" y="612" font-size="11" font-weight="700" fill="#0366d6">⑨ restore(answer, vault)</text>
    <text x="80" y="634" font-size="10.5" fill="#24292e">Pure local string replacement.</text>
    <text x="80" y="652" font-size="10.5" fill="#24292e">No network. No API call.</text>
    <text x="80" y="670" font-size="10.5" fill="#24292e">Uses the local vault from step ③b.</text>
  </g>

  <!-- arrow vault → restore -->
  <path d="M 450 556 Q 450 590 320 615" fill="none" stroke="#735c0f" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-internal)"/>
  <text x="440" y="582" font-size="9" font-style="italic" fill="#735c0f">vault lookup</text>

  <!-- Final: restored answer -->
  <!-- arrow down from restore -->
  <line x1="190" y1="676" x2="190" y2="698" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow-internal)"/>

  <g filter="url(#shadow)">
    <rect x="60" y="700" width="500" height="42" rx="10" fill="#e6f6ec" stroke="#2ea44f" stroke-width="1.5"/>
    <text x="80" y="725" font-size="12" font-weight="700" fill="#1a7f37">⑩ FINAL ANSWER  ·  </text>
    <text x="215" y="725" font-size="11" font-family="ui-monospace, monospace" fill="#24292e">"Maria Petrova is the plaintiff; Acme is the contract counterparty."</text>
  </g>

  <!-- ===== Side panel: trust analysis ===== -->
  <g transform="translate(660, 590)" filter="url(#shadow)">
    <rect x="0" y="0" width="480" height="152" rx="10" fill="#f6f8fa" stroke="#d1d5da" stroke-width="1.5"/>
    <text x="20" y="25" font-size="13" font-weight="700" fill="#24292e">What this gets you (and what it doesn't)</text>
    <line x1="20" y1="35" x2="460" y2="35" stroke="#e1e4e8" stroke-width="1"/>

    <text x="20" y="56" font-size="10.5" fill="#1a7f37" font-weight="700">✓ LLM provider's logs, retention, and training pipeline never see real names.</text>
    <text x="20" y="73" font-size="10.5" fill="#1a7f37" font-weight="700">✓ Document utility preserved — the LLM can answer "who sued whom".</text>
    <text x="20" y="90" font-size="10.5" fill="#1a7f37" font-weight="700">✓ Restore is purely local — no extra round-trip after the LLM call.</text>

    <text x="20" y="115" font-size="10.5" fill="#b62324" font-weight="700">✗ Mosaic risk not addressed — use Pro mode for QUASI generalisation.</text>
    <text x="20" y="132" font-size="10.5" fill="#b62324" font-weight="700">✗ Vault is the new secret — encrypt at rest, rotate per session.</text>
  </g>
</svg>
