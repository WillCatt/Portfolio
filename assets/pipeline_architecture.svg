<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#586069"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e36209"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0366d6"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#fafbfc"/>

  <!-- ===== Title block ===== -->
  <text x="40" y="44" font-size="22" font-weight="700" fill="#24292e">Pipeline architecture</text>
  <text x="40" y="68" font-size="13" fill="#586069">Same span-detection front end · two redaction strategies · pseudonymise overlay · per-decision audit log</text>

  <!-- ===== Stage 1: Input ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="115" width="170" height="80" rx="10" fill="#ffffff" stroke="#d1d5da" stroke-width="1.5"/>
    <text x="125" y="148" font-size="13" font-weight="600" text-anchor="middle" fill="#24292e">Input text</text>
    <text x="125" y="170" font-size="11" text-anchor="middle" fill="#586069">legal document /</text>
    <text x="125" y="184" font-size="11" text-anchor="middle" fill="#586069">matter note</text>
  </g>

  <!-- arrow -->
  <line x1="215" y1="155" x2="252" y2="155" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 2: Span detection (boxed group) ===== -->
  <rect x="255" y="95" width="445" height="190" rx="12" fill="#f1f8ff" stroke="#c8e1ff" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="277" y="116" font-size="11" font-weight="700" fill="#0366d6" letter-spacing="0.5">SPAN DETECTION  ·  shared front end</text>

  <!-- NER -->
  <g filter="url(#shadow)">
    <rect x="277" y="132" width="135" height="64" rx="8" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="344" y="153" font-size="12" font-weight="700" text-anchor="middle" fill="#0366d6">NER predictor</text>
    <text x="344" y="170" font-size="10" text-anchor="middle" fill="#586069">spaCy · BERT-NER</text>
    <text x="344" y="183" font-size="10" text-anchor="middle" fill="#586069">RoBERTa-FT · LegalBERT</text>
  </g>
  <text x="344" y="217" font-size="10" font-weight="600" text-anchor="middle" fill="#0366d6">Phase 1, 2, 6</text>

  <!-- arrow -->
  <line x1="416" y1="164" x2="447" y2="164" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Regex pass -->
  <g filter="url(#shadow)">
    <rect x="450" y="132" width="115" height="64" rx="8" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="507" y="153" font-size="12" font-weight="700" text-anchor="middle" fill="#0366d6">Regex pass</text>
    <text x="507" y="170" font-size="10" text-anchor="middle" fill="#586069">CASE_NO · IBAN</text>
    <text x="507" y="183" font-size="10" text-anchor="middle" fill="#586069">phone · email</text>
  </g>
  <text x="507" y="217" font-size="10" font-weight="600" text-anchor="middle" fill="#0366d6">Phase 3</text>

  <!-- arrow -->
  <line x1="568" y1="164" x2="599" y2="164" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Coref extender -->
  <g filter="url(#shadow)">
    <rect x="602" y="132" width="88" height="64" rx="8" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="646" y="153" font-size="12" font-weight="700" text-anchor="middle" fill="#0366d6">Coref</text>
    <text x="646" y="167" font-size="12" font-weight="700" text-anchor="middle" fill="#0366d6">extender</text>
    <text x="646" y="184" font-size="9.5" text-anchor="middle" fill="#586069">shorthand</text>
  </g>
  <text x="646" y="217" font-size="10" font-weight="600" text-anchor="middle" fill="#0366d6">Phase 5</text>

  <text x="478" y="266" font-size="11" font-style="italic" text-anchor="middle" fill="#586069">→ produces (start, end, entity_type, span_text) ·  union of NER ∪ regex ∪ coref</text>

  <!-- ===== arrow into role classifier ===== -->
  <line x1="703" y1="190" x2="745" y2="190" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 3: Role classifier ===== -->
  <g filter="url(#shadow)">
    <rect x="748" y="148" width="160" height="86" rx="10" fill="#ffffff" stroke="#586069" stroke-width="1.5"/>
    <text x="828" y="174" font-size="13" font-weight="700" text-anchor="middle" fill="#24292e">Role classifier</text>
    <text x="828" y="194" font-size="11" text-anchor="middle" fill="#d73a49" font-weight="600">DIRECT</text>
    <text x="828" y="211" font-size="11" text-anchor="middle" fill="#e36209" font-weight="600">QUASI</text>
    <text x="828" y="228" font-size="10" text-anchor="middle" fill="#586069">per-span tag</text>
  </g>

  <!-- ===== Branch fork ===== -->
  <!-- Lite branch (top) -->
  <path d="M 908 175 Q 940 175 940 130 L 970 130" fill="none" stroke="#2ea44f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="950" y="116" font-size="11" font-weight="700" fill="#2ea44f">REDACT</text>

  <!-- Pro branch (bottom) -->
  <path d="M 908 205 Q 940 205 940 290 L 970 290" fill="none" stroke="#0366d6" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <text x="950" y="316" font-size="11" font-weight="700" fill="#0366d6">ANONYMISE</text>

  <!-- ===== Lite path ===== -->
  <g filter="url(#shadow)">
    <rect x="973" y="98" width="187" height="64" rx="8" fill="#ffffff" stroke="#2ea44f" stroke-width="1.5"/>
    <text x="1066" y="120" font-size="12" font-weight="700" text-anchor="middle" fill="#2ea44f">Suppress DIRECTs</text>
    <text x="1066" y="138" font-size="10" text-anchor="middle" fill="#586069">PERSON → [PERSON]</text>
    <text x="1066" y="152" font-size="10" text-anchor="middle" fill="#586069">CODE → [CODE], etc.</text>
  </g>
  <text x="1066" y="180" font-size="10" text-anchor="middle" fill="#586069" font-style="italic">QUASI mentions left intact</text>

  <!-- ===== Pro path ===== -->
  <!-- Step 1: suppress DIRECTs -->
  <g filter="url(#shadow)">
    <rect x="973" y="262" width="187" height="58" rx="8" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="1066" y="283" font-size="12" font-weight="700" text-anchor="middle" fill="#0366d6">Suppress DIRECTs</text>
    <text x="1066" y="303" font-size="10" text-anchor="middle" fill="#586069">same as Redact</text>
  </g>

  <!-- arrow down -->
  <line x1="1066" y1="322" x2="1066" y2="345" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: mosaic scorer -->
  <g filter="url(#shadow)">
    <rect x="973" y="348" width="187" height="64" rx="8" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="1066" y="369" font-size="12" font-weight="700" text-anchor="middle" fill="#0366d6">Mosaic scorer</text>
    <text x="1066" y="387" font-size="10" text-anchor="middle" fill="#586069">k = docs sharing</text>
    <text x="1066" y="401" font-size="10" text-anchor="middle" fill="#586069">residual QUASI fingerprint</text>
  </g>

  <!-- decision diamond -->
  <g filter="url(#shadow)">
    <polygon points="1066,432 1148,478 1066,524 984,478" fill="#ffffff" stroke="#586069" stroke-width="1.5"/>
    <text x="1066" y="475" font-size="12" font-weight="700" text-anchor="middle" fill="#24292e">k ≥ target?</text>
    <text x="1066" y="491" font-size="10" text-anchor="middle" fill="#586069">(default k = 5)</text>
  </g>

  <!-- arrow scorer -> diamond -->
  <line x1="1066" y1="412" x2="1066" y2="432" stroke="#586069" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NO branch: generalize loop -->
  <path d="M 984 478 L 925 478" fill="none" stroke="#e36209" stroke-width="2" marker-end="url(#arrow-loop)"/>
  <text x="954" y="470" font-size="10" font-weight="700" fill="#e36209">no</text>

  <g filter="url(#shadow)">
    <rect x="735" y="442" width="185" height="72" rx="8" fill="#fff5b1" stroke="#e36209" stroke-width="1.5"/>
    <text x="827" y="464" font-size="12" font-weight="700" text-anchor="middle" fill="#735c0f">Advance every QUASI</text>
    <text x="827" y="478" font-size="12" font-weight="700" text-anchor="middle" fill="#735c0f">one generalisation level</text>
    <text x="827" y="496" font-size="10" text-anchor="middle" fill="#735c0f">47 → ~50 → 40s → [QUANTITY]</text>
    <text x="827" y="508" font-size="10" text-anchor="middle" fill="#735c0f">Plovdiv → Bulgaria → Europe</text>
  </g>

  <!-- loop arrow back up to scorer -->
  <path d="M 827 442 Q 827 380 973 380" fill="none" stroke="#e36209" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow-loop)"/>
  <text x="850" y="395" font-size="10" font-style="italic" fill="#e36209">recompute k</text>

  <!-- max iterations fallback -->
  <text x="827" y="535" font-size="10" font-style="italic" text-anchor="middle" fill="#586069">if max_iterations reached → suppress all QUASIs</text>

  <!-- YES branch: output -->
  <path d="M 1148 478 L 1175 478" fill="none" stroke="#2ea44f" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1156" y="468" font-size="10" font-weight="700" fill="#2ea44f">yes</text>

  <!-- ===== Pseudonymise overlay ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="320" width="660" height="86" rx="10" fill="#fff5e6" stroke="#e36209" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="60" y="345" font-size="12" font-weight="700" fill="#e36209">PSEUDONYMISE OVERLAY  ·  Phase 4  ·  pseudonymise=True</text>
    <text x="60" y="365" font-size="11" fill="#24292e">Replace [PERSON] / [ORG] with referential tokens: <tspan font-family="monospace" fill="#0366d6">[PERSON_A], [PERSON_B], [ORG_A], …</tspan></text>
    <text x="60" y="382" font-size="11" fill="#24292e">Same surface form → same token (substring-rule coref) · mapping kept in a <tspan font-weight="700">vault</tspan> (stays local).</text>
    <text x="60" y="397" font-size="11" fill="#586069" font-style="italic">→ enables LLM round-trip: <tspan font-family="monospace">restore(llm_answer, vault)</tspan> swaps tokens back locally.</text>
  </g>

  <!-- ===== Outputs ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="555" width="350" height="135" rx="10" fill="#ffffff" stroke="#d1d5da" stroke-width="1.5"/>
    <text x="60" y="580" font-size="13" font-weight="700" fill="#24292e">Output (Redact or Anonymise)</text>
    <line x1="60" y1="590" x2="370" y2="590" stroke="#e1e4e8" stroke-width="1"/>
    <text x="60" y="611" font-size="11" fill="#24292e"><tspan font-weight="600">redacted_text</tspan> — same string with spans replaced</text>
    <text x="60" y="630" font-size="11" fill="#24292e"><tspan font-weight="600">audit log</tspan> — per-decision JSON (every span, why)</text>
    <text x="60" y="649" font-size="11" fill="#24292e"><tspan font-weight="600">mosaic risk badge</tspan> (Anonymise) — <tspan font-family="monospace">k_init → k_final, iters</tspan></text>
    <text x="60" y="668" font-size="11" fill="#24292e"><tspan font-weight="600">vault</tspan> (if pseudonymise) — token → original mapping</text>
  </g>

  <!-- arrow from Lite output down to outputs box -->
  <path d="M 1066 162 Q 1066 200 770 200 Q 470 200 410 555" fill="none" stroke="#2ea44f" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6"/>
  <!-- arrow from Pro output (diamond yes) down to outputs box -->
  <path d="M 1175 478 Q 1188 478 1188 600 L 410 605 Z" fill="none" stroke="#2ea44f" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.0"/>
  <path d="M 1175 478 Q 1190 478 1190 555 L 410 600" fill="none" stroke="#0366d6" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6" marker-end="url(#arrow-accent)"/>

  <!-- ===== Legend ===== -->
  <g transform="translate(440, 555)">
    <rect x="0" y="0" width="350" height="135" rx="10" fill="#ffffff" stroke="#d1d5da" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="25" font-size="13" font-weight="700" fill="#24292e">Phase legend</text>
    <line x1="20" y1="35" x2="330" y2="35" stroke="#e1e4e8" stroke-width="1"/>

    <rect x="20" y="48" width="14" height="14" rx="3" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="42" y="59" font-size="11" fill="#24292e">Phase 1–2, 6 — model bake-off + fine-tune</text>

    <rect x="20" y="71" width="14" height="14" rx="3" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="42" y="82" font-size="11" fill="#24292e">Phase 3 — Redact &amp; Anonymise pipelines + regex pass</text>

    <rect x="20" y="94" width="14" height="14" rx="3" fill="#fff5e6" stroke="#e36209" stroke-width="1.5"/>
    <text x="42" y="105" font-size="11" fill="#24292e">Phase 4 — Pseudonymise + vault + restore()</text>

    <rect x="20" y="117" width="14" height="14" rx="3" fill="#ffffff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="42" y="128" font-size="11" fill="#24292e">Phase 5 — Coref extender (catches shorthand)</text>
  </g>

  <!-- ===== Side panel: design notes ===== -->
  <g transform="translate(820, 555)">
    <rect x="0" y="0" width="340" height="135" rx="10" fill="#f6f8fa" stroke="#d1d5da" stroke-width="1.5"/>
    <text x="20" y="25" font-size="13" font-weight="700" fill="#24292e">Design notes</text>
    <line x1="20" y1="35" x2="320" y2="35" stroke="#e1e4e8" stroke-width="1"/>
    <text x="20" y="55" font-size="10.5" fill="#24292e">• <tspan font-weight="600">Same front-end, two strategies.</tspan> Redact ≈ &lt;100ms;</text>
    <text x="20" y="70" font-size="10.5" fill="#24292e">  Anonymise runs the loop, typically 2–3 iters to converge.</text>
    <text x="20" y="88" font-size="10.5" fill="#24292e">• <tspan font-weight="600">Pseudonymise is orthogonal</tspan> — applies to either</text>
    <text x="20" y="103" font-size="10.5" fill="#24292e">  pipeline by setting <tspan font-family="monospace">pseudonymise=True</tspan>.</text>
    <text x="20" y="121" font-size="10.5" fill="#24292e">• <tspan font-weight="600">Audit log</tspan> records every span + decision for review.</text>
  </g>
</svg>
