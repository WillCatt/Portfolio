<title>More exercise, higher blood sugar?</title>

  .axis { stroke: var(--grid); stroke-width: 1; }
  .axislabel { fill: var(--muted); font-size: 12px; }
  .callout { font-size: 13px; font-weight: 600; }
  .hint { color: var(--muted); font-size: .85rem; margin-top: .4rem; }

const svg = document.getElementById("chart");
const NS = "http://www.w3.org/2000/svg";
const W = 760, H = 470;
const M = { l: 64, r: 18, t: 18, b: 52 };
const plotW = W - M.l - M.r, plotH = H - M.t - M.b;

const [x0, x1] = DATA.domain.x, [y0, y1] = DATA.domain.y;
const sx = v => M.l + (v - x0) / (x1 - x0) * plotW;
const sy = v => M.t + (1 - (v - y0) / (y1 - y0)) * plotH;

const GREY = "#cdbfae", AMBER = "#b06a16", MUTED = "#7a6e63";

function hexToRgb(h){ h=h.replace('#',''); return [0,2,4].map(i=>parseInt(h.slice(i,i+2),16)); }
function lerp(a,b,t){ return a+(b-a)*t; }
function mix(h1,h2,t){ const a=hexToRgb(h1),b=hexToRgb(h2);
  return `rgb(${a.map((v,i)=>Math.round(lerp(v,b[i],t))).join(',')})`; }
function el(name, attrs){ const e=document.createElementNS(NS,name);
  for(const k in attrs) e.setAttribute(k, attrs[k]); return e; }

function drawAxes(){
  svg.appendChild(el("line",{class:"axis",x1:M.l,y1:M.t,x2:M.l,y2:M.t+plotH}));
  svg.appendChild(el("line",{class:"axis",x1:M.l,y1:M.t+plotH,x2:M.l+plotW,y2:M.t+plotH}));
  const xl = el("text",{class:"axislabel","text-anchor":"middle",x:M.l+plotW/2,y:H-12});
  xl.textContent = DATA.xLabel; svg.appendChild(xl);
  const yl = el("text",{class:"axislabel","text-anchor":"middle",
    transform:`translate(15,${M.t+plotH/2}) rotate(-90)`});
  yl.textContent = DATA.yLabel; svg.appendChild(yl);
}

const dyn = el("g",{});
drawAxes();
svg.appendChild(dyn);

function lineSeg(m,b,xa,xb,color,opacity,width){
  return el("line",{x1:sx(xa),y1:sy(m*xa+b),x2:sx(xb),y2:sy(m*xb+b),
    stroke:color,"stroke-width":width,"stroke-opacity":opacity,"stroke-linecap":"round"});
}
function bandExtent(bi){
  let lo=Infinity, hi=-Infinity;
  for(const p of DATA.points) if(p.band===bi){ lo=Math.min(lo,p.x); hi=Math.max(hi,p.x); }
  return [lo,hi];
}

function render(t){
  dyn.replaceChildren();
  for(const p of DATA.points){
    const col = mix(GREY, DATA.bandColors[p.band], t);
    dyn.appendChild(el("circle",{cx:sx(p.x),cy:sy(p.y),r:3.6,fill:col,"fill-opacity":0.9-0.05*t}));
  }
  if(t < 0.999){
    dyn.appendChild(lineSeg(DATA.pooled.m, DATA.pooled.b, x0+0.4*(x1-x0)/8, x1-0.4*(x1-x0)/8, AMBER, 1-t, 3.4));
  }
  DATA.bandFits.forEach((f,i)=>{
    const [xa,xb] = bandExtent(i);
    dyn.appendChild(lineSeg(f.m, f.b, xa, xb, DATA.bandColors[i], t, 3.4));
  });
  const txt = el("text",{class:"callout","text-anchor":"end",x:W-M.r,y:M.t+plotH-10});
  txt.textContent = t < 0.5 ? DATA.calloutPooled : DATA.calloutSplit;
  txt.setAttribute("fill", t < 0.5 ? AMBER : MUTED);
  dyn.appendChild(txt);
}

const slider = document.getElementById("reveal");
const stateEl = document.getElementById("state");
function update(){
  const t = slider.value/100;
  render(t);
  stateEl.textContent = t<0.05 ? DATA.statePooled : t>0.95 ? DATA.stateSplit : `${slider.value}%`;
}
slider.addEventListener("input", update);
update();
