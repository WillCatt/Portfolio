const [x0,x1]=DATA.domain.x,[y0,y1]=DATA.domain.y;
const sx=v=>M.l+(v-x0)/(x1-x0)*plotW, sy=v=>M.t+(1-(v-y0)/(y1-y0))*plotH;
const GREY="#cdbfae", AMBER="#b06a16", TEAL="#2a8f8f", MUTED="#7a6e63";
function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function seg(m,b,xa,xb,c,o,w){return el("line",{x1:sx(xa),y1:sy(m*xa+b),x2:sx(xb),y2:sy(m*xb+b),
  stroke:c,"stroke-width":w,"stroke-opacity":o,"stroke-linecap":"round"});}
function axes(){
  svg.appendChild(el("line",{class:"axis",x1:M.l,y1:M.t,x2:M.l,y2:M.t+plotH}));
  svg.appendChild(el("line",{class:"axis",x1:M.l,y1:M.t+plotH,x2:M.l+plotW,y2:M.t+plotH}));
  const xl=el("text",{class:"axislabel","text-anchor":"middle",x:M.l+plotW/2,y:H-12});xl.textContent=DATA.xLabel;svg.appendChild(xl);
  const yl=el("text",{class:"axislabel","text-anchor":"middle",transform:`translate(15,${M.t+plotH/2}) rotate(-90)`});yl.textContent=DATA.yLabel;svg.appendChild(yl);
}
const dyn=el("g",{});axes();svg.appendChild(dyn);
const xs=DATA.points.map(p=>p.x), ys=DATA.points.map(p=>p.y);
function render(t){
  dyn.replaceChildren();
  // individuals fade as we move to the aggregate view
  for(const p of DATA.points){
    dyn.appendChild(el("circle",{cx:sx(p.x),cy:sy(p.y),r:3.2,
      fill:DATA.groupColors[p.group],"fill-opacity":0.7*(1-t)+0.05}));
  }
  // individual-level fit (down) fades out
  if(t<0.999) dyn.appendChild(seg(DATA.indFit.m,DATA.indFit.b,Math.min(...xs),Math.max(...xs),AMBER,1-t,3.4));
  // group means + aggregate fit fade in
  const gx=DATA.groupMeans.map(g=>g.x);
  if(t>0.001){
    dyn.appendChild(seg(DATA.meanFit.m,DATA.meanFit.b,Math.min(...gx),Math.max(...gx),TEAL,t,3.4));
    DATA.groupMeans.forEach((g,i)=>{
      dyn.appendChild(el("circle",{cx:sx(g.x),cy:sy(g.y),r:7,fill:DATA.groupColors[i],
        stroke:"#fff","stroke-width":1.5,"fill-opacity":t}));
    });
  }
  const txt=el("text",{class:"callout","text-anchor":"end",x:W-M.r,y:M.t+plotH-10});
  txt.textContent = t<0.5 ? DATA.calloutPooled : DATA.calloutSplit;
  txt.setAttribute("fill", t<0.5 ? AMBER : TEAL);
  dyn.appendChild(txt);
}
const slider=document.getElementById("reveal"), st=document.getElementById("state");
slider.addEventListener("input",()=>{const t=slider.value/100;render(t);
  st.textContent=t<0.05?DATA.statePooled:t>0.95?DATA.stateSplit:`${slider.value}%`;});
render(0); st.textContent=DATA.statePooled;
</script>
</body>
</html>
