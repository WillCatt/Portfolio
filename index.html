<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>William Catt · Data Scientist</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="description" content="William Catt — data scientist building end-to-end ML systems with rigorous evaluation and honest results. Featured: a legal-text PII redaction pipeline with re-identification risk analysis, and QuoteGuard, a guardrailed RAG insurance chatbot." />
  <link rel="canonical" href="https://williamcatt.dev/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://williamcatt.dev/" />
  <meta property="og:title" content="William Catt — Data Scientist" />
  <meta property="og:description" content="End-to-end ML systems, rigorous evaluation, honest results. Featured: legal-text PII redaction + re-identification risk analysis, and QuoteGuard, a guardrailed RAG insurance chatbot." />
  <meta property="og:image" content="https://williamcatt.dev/assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="William Catt — Data Scientist" />
  <meta name="twitter:description" content="End-to-end ML systems, rigorous evaluation, honest results. Featured: legal-text PII redaction + re-identification risk analysis, and QuoteGuard, a guardrailed RAG insurance chatbot." />
  <meta name="twitter:image" content="https://williamcatt.dev/assets/og-image.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf8f4;
      --bg2: #f2ede4;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #1a1714;
      --text-muted: #7a6e63;
      --text-dim: #c4b8aa;
      --accent: oklch(52% 0.14 50);
      --accent-soft: oklch(52% 0.14 50 / 0.08);
      --live: oklch(58% 0.16 145);
      --wip: oklch(62% 0.17 60);
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    @keyframes pulseLive {
      0%, 100% { box-shadow: 0 0 0 0 var(--live), 0 0 8px var(--live); }
      50% { box-shadow: 0 0 0 4px transparent, 0 0 12px var(--live); }
    }
    @keyframes pulseWip {
      0%, 100% { box-shadow: 0 0 0 0 var(--wip); opacity: 0.6; }
      50% { box-shadow: 0 0 0 3px transparent; opacity: 1; }
    }
    .status-dot {
      display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.live {
      background: var(--live);
      animation: pulseLive 2s ease-in-out infinite;
    }
    .status-dot.wip {
      background: var(--wip);
      animation: pulseWip 1.6s ease-in-out infinite;
    }
    .status-dot.planned {
      background: var(--text-dim);
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.12em; padding: 4px 10px;
      border-radius: 999px; border: 1px solid currentColor;
    }
    .status-pill.live { color: var(--live); background: oklch(58% 0.16 145 / 0.08); }
    .status-pill.wip { color: var(--wip); background: oklch(62% 0.17 60 / 0.08); }
    .status-pill.planned { color: var(--text-dim); background: rgba(0,0,0,0.02); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── PROJECT DATA — edit here to add/remove projects ───────────────────────────
const PROJECTS = [
  { id: "anonymiser", index: "01", title: "Legal Text Anonymiser",
    subtitle: "PII redaction + re-identification risk for legal text",
    hook: 'How redacted is *"redacted"*? Measuring re-identification risk.',
    chips: ["F1 0.85", "re-ID risk modelled"],
    chart: "assets/overview_accuracy.png",
    color: "oklch(52% 0.14 145)", status: "live", featured: true,
    tags: ["NLP", "NER", "RoBERTa"], year: 2026, q: "Q2" },
  { id: "quoteguard", index: "02", title: "QuoteGuard",
    subtitle: "Guardrailed, grounded RAG over an insurance policy",
    hook: "A chatbot that *refuses to invent prices* or give advice.",
    chips: ["72%→100% safe", "page-cited"],
    chart: "assets/quoteguard/adversarial_iteration.png",
    color: "oklch(52% 0.14 200)", status: "live", featured: true,
    tags: ["RAG", "Guardrails", "Retrieval"], year: 2026, q: "Q2" },
  { id: "blackjack", index: "03", title: "Blackjack Simulator",
    subtitle: "Monte Carlo strategy analysis",
    hook: "Does card counting *actually* beat the house?",
    chips: ["1.6M hands", "+1.02% ROR"],
    chart: "assets/blackjack/fig_ranking.png",
    color: "oklch(52% 0.14 25)", status: "live", featured: true,
    tags: ["Simulation", "Python", "Monte Carlo"], year: 2026, q: "Q2" },
  { id: "kaggle", index: "04", title: "Kaggle Competitions",
    subtitle: "Competitive ML — tabular, NLP, vision",
    color: "oklch(52% 0.14 50)", status: "planned", featured: true,
    tags: ["Kaggle", "ML", "XGBoost"], year: 2026, q: "Q1" }
];

// Landing shows the first 3 featured; the rest live in the full archive.
const FEATURED = PROJECTS.filter(p => p.featured).slice(0, 3);

// ─── Notebook cell wrapper ────────────────────────────────────────────────────
function Cell({ n, type, children, visible }) {
  return (
    <div style={{
      display: "flex", gap: 16,
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(10px)",
      transition: "all 0.5s ease"
    }}>
      <div style={{
        fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-dim)",
        paddingTop: 14, minWidth: 64, textAlign: "right"
      }}>
        {type === "in" ? `In [${n}]:` : type === "out" ? `Out[${n}]:` : ""}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>{children}</div>
    </div>
  );
}

function CodeLine({ children }) {
  return (
    <div style={{
      background: "rgba(0,0,0,0.03)",
      borderLeft: "3px solid var(--accent)",
      padding: "12px 18px", borderRadius: 4,
      fontFamily: "var(--font-mono)", fontSize: 13, lineHeight: 1.7
    }}>{children}</div>
  );
}

const kw = (t) => <span style={{ color: "#a35f2e" }}>{t}</span>;
const str = (t) => <span style={{ color: "#5b8a3a" }}>{t}</span>;

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(0);
  const [openIdx, setOpenIdx] = useState(0);
  const [hovered, setHovered] = useState(null);
  const [reduceMotion, setReduceMotion] = useState(false);

  useEffect(() => {
    const timers = [];
    for (let i = 1; i <= 10; i++) {
      timers.push(setTimeout(() => setStep(i), i * 320));
    }
    return () => timers.forEach(clearTimeout);
  }, []);

  // Respect the OS "reduce motion" setting — no auto-cycle for those users.
  useEffect(() => {
    const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    const apply = () => setReduceMotion(mq.matches);
    apply();
    mq.addEventListener("change", apply);
    return () => mq.removeEventListener("change", apply);
  }, []);

  // Auto-cycle which featured card is expanded; pauses on hover / reduced motion.
  useEffect(() => {
    if (reduceMotion || hovered !== null) return;
    const t = setInterval(() => setOpenIdx(i => (i + 1) % FEATURED.length), 3200);
    return () => clearInterval(t);
  }, [reduceMotion, hovered]);

  const activeIdx = hovered !== null ? hovered : (reduceMotion ? null : openIdx);

  return (
    <div style={{ minHeight: "100vh", padding: "32px clamp(24px, 5vw, 64px) 80px" }}>
      {/* Notebook header */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        marginBottom: 32, paddingBottom: 14, borderBottom: "1px solid var(--border)",
        maxWidth: 1100, margin: "0 auto 32px"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ display: "flex", gap: 6 }}>
            <div style={{ width: 11, height: 11, borderRadius: "50%", background: "#e8a18a" }} />
            <div style={{ width: 11, height: 11, borderRadius: "50%", background: "#e8c878" }} />
            <div style={{ width: 11, height: 11, borderRadius: "50%", background: "#a8c878" }} />
          </div>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-muted)" }}>
            portfolio.ipynb
          </span>
        </div>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--accent)" }}>
          ● Python 3.11 — Idle
        </span>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 26, maxWidth: 1100, margin: "0 auto" }}>

        {/* Cell 1: Bio header */}
        <Cell n=" " type="" visible={step >= 1}>
          <div style={{ display: "flex", gap: 32, alignItems: "flex-start", flexWrap: "wrap" }}>
            {/* Monogram avatar (swap for <img> when a photo is ready) */}
            <div style={{
              width: 140, height: 140, borderRadius: 18,
              background: "linear-gradient(135deg, oklch(74% 0.09 55), oklch(55% 0.13 45))",
              flexShrink: 0,
              display: "flex", alignItems: "center", justifyContent: "center",
              border: "1px solid var(--border)",
              boxShadow: "0 6px 20px oklch(55% 0.13 45 / 0.28)",
              position: "relative", overflow: "hidden"
            }}>
              <div style={{
                position: "absolute", inset: 0,
                background: "repeating-linear-gradient(45deg, transparent, transparent 9px, rgba(255,255,255,0.05) 9px, rgba(255,255,255,0.05) 10px)"
              }} />
              <span style={{
                zIndex: 1, fontFamily: "var(--font-display)", fontSize: 50, fontWeight: 700,
                color: "#fff", letterSpacing: "-0.02em", textShadow: "0 2px 8px rgba(0,0,0,0.15)"
              }}>WC</span>
            </div>

            <div style={{ flex: 1, minWidth: 280, paddingTop: 6 }}>
              <h1 style={{
                fontSize: "clamp(40px, 5vw, 56px)", fontWeight: 700,
                letterSpacing: "-0.03em", lineHeight: 1.05, marginBottom: 10
              }}>
                William Catt
              </h1>
              <p style={{ fontSize: 16, color: "var(--text-muted)", fontWeight: 300, lineHeight: 1.6, marginBottom: 16 }}>
                Data scientist building ML systems end-to-end — measurement, modelling and deployment — with a bias toward rigorous evaluation and honest results, including the experiments that don't pan out. Featured work: a legal-text PII redaction pipeline with re-identification ("mosaic") risk analysis, and QuoteGuard, a guardrailed RAG chatbot that stays grounded in an insurance policy and refuses to give advice or invent prices. More in progress.
              </p>
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--accent)" }}>
                <a href="https://github.com/WillCatt" target="_blank" rel="noreferrer">github.com/WillCatt ↗</a>
                <span style={{ color: "var(--text-dim)" }}>·</span>
                <a href="https://www.linkedin.com/in/william-catt/" target="_blank" rel="noreferrer">linkedin.com/in/william-catt ↗</a>
                <span style={{ color: "var(--text-dim)" }}>·</span>
                <a href="mailto:wcatt98@gmail.com">wcatt98@gmail.com</a>
              </div>
            </div>
          </div>
        </Cell>

        {/* Cell 2: Import */}
        <Cell n="1" type="in" visible={step >= 2}>
          <CodeLine>
            {kw("from")} portfolio {kw("import")} projects
          </CodeLine>
        </Cell>

        {/* Cell 3: Query */}
        <Cell n="2" type="in" visible={step >= 3}>
          <CodeLine>
            projects.featured(<span style={{ color: "var(--text-muted)" }}>limit</span>={str("3")})
          </CodeLine>
        </Cell>

        {/* Cell 4: Project grid output */}
        <Cell n="2" type="out" visible={step >= 4}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14 }}>
            {FEATURED.map((p, i) => (
              <ProjectCard key={p.id} p={p} visible={step >= 4 + i * 0.3}
                expanded={activeIdx === i}
                onEnter={() => setHovered(i)} onLeave={() => setHovered(null)} />
            ))}
          </div>
        </Cell>

        {/* Cell 5: View all */}
        <Cell n="3" type="in" visible={step >= 9}>
          <CodeLine>
            projects.all()  <span style={{ color: "var(--text-muted)" }}># view full archive</span>
          </CodeLine>
        </Cell>

        <Cell n="3" type="out" visible={step >= 10}>
          <a href="all-projects.html" style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "20px 24px", borderRadius: 10,
            background: "var(--card)", border: "1px solid var(--border)",
            transition: "all 0.2s ease"
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 6px 18px rgba(0,0,0,0.05)"; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
          >
            <div>
              <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--accent)", letterSpacing: "0.14em", marginBottom: 4 }}>
                ARCHIVE
              </div>
              <div style={{ fontSize: 17, fontWeight: 600 }}>View all projects</div>
              <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>
                Searchable list of every project, past and present
              </div>
            </div>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 18, color: "var(--accent)" }}>→</span>
          </a>
        </Cell>

      </div>
    </div>
  );
}

// Render a hook string, colouring any *emphasised* spans in the project hue.
function renderHook(hook, color) {
  return hook.split("*").map((part, i) =>
    i % 2 === 1
      ? <span key={i} style={{ color, fontWeight: 500 }}>{part}</span>
      : <React.Fragment key={i}>{part}</React.Fragment>
  );
}

function ProjectCard({ p, visible, expanded, onEnter, onLeave }) {
  const isLive = p.status === "live";
  const hasDetail = !!p.chart;
  const open = hasDetail && expanded;
  return (
    <a href={`projects/${p.id}.html`}
       onMouseEnter={onEnter} onMouseLeave={onLeave}
       style={{
         position: "relative", display: "flex", flexDirection: "column",
         padding: "20px 22px", borderRadius: 12,
         background: "var(--card)",
         border: "1px solid var(--border)",
         borderLeft: `3px solid ${p.color}`,
         transition: "all 0.25s ease",
         transform: open ? "translateY(-4px)" : "translateY(0)",
         boxShadow: open ? `0 14px 30px ${p.color.replace(")", " / 0.20)")}` : "0 2px 6px rgba(0,0,0,0.03)",
         opacity: visible ? (isLive ? 1 : 0.9) : 0,
         minHeight: 176
       }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: p.color, letterSpacing: "0.12em", fontWeight: 500 }}>
          {p.index}
        </span>
        <span className={`status-pill ${p.status}`}>
          <span className={`status-dot ${p.status}`}></span>
          {isLive ? "LIVE" : p.status === "wip" ? "IN PROGRESS" : "PLANNED"}
        </span>
      </div>
      <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 6, letterSpacing: "-0.01em" }}>
        {p.title}
      </div>
      <div style={{ fontSize: 13.5, color: p.hook ? "var(--text)" : "var(--text-muted)", lineHeight: 1.5 }}>
        {p.hook ? renderHook(p.hook, p.color) : p.subtitle}
      </div>
      {p.chips && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
          {p.chips.map(c => (
            <span key={c} style={{
              fontFamily: "var(--font-mono)", fontSize: 10, padding: "4px 9px", borderRadius: 5,
              color: p.color,
              background: p.color.replace(")", " / 0.09)"),
              border: `1px solid ${p.color.replace(")", " / 0.22)")}`,
              letterSpacing: "0.03em"
            }}>{c}</span>
          ))}
        </div>
      )}
      {hasDetail && (
        <div style={{
          maxHeight: open ? 200 : 0, opacity: open ? 1 : 0, marginTop: open ? 14 : 0,
          overflow: "hidden",
          transition: "max-height 0.42s cubic-bezier(.4,0,.2,1), opacity 0.3s ease, margin-top 0.42s ease"
        }}>
          <div style={{ height: 1, background: "var(--border)", marginBottom: 12 }} />
          <img src={p.chart} alt={`${p.title} — key result`} loading="lazy" style={{
            width: "100%", height: 150, objectFit: "contain", objectPosition: "center",
            background: "#fff", padding: 6, borderRadius: 8, border: "1px solid var(--border)", display: "block"
          }} />
        </div>
      )}
      <div style={{ marginTop: "auto", paddingTop: 16, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
          {p.tags.map(t => (
            <span key={t} style={{
              fontFamily: "var(--font-mono)", fontSize: 9, padding: "3px 8px",
              background: "rgba(0,0,0,0.04)", borderRadius: 3, color: "var(--text-muted)",
              letterSpacing: "0.04em"
            }}>{t}</span>
          ))}
        </div>
        <span style={{
          fontFamily: "var(--font-mono)", fontSize: 16, color: p.color, alignSelf: "center",
          opacity: open ? 1 : 0, transform: open ? "translateX(0)" : "translateX(-6px)",
          transition: "all 0.22s ease", flexShrink: 0, marginLeft: 8
        }}>→</span>
      </div>
    </a>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
