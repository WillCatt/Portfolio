<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── PROJECT DATA — edit here to add/remove projects ───────────────────────────
// `priority` controls the featured order: lower = shown first. The landing
// pulls from ALL live projects sorted by priority; `limit` (visitor-editable)
// just slices that ranking. Planned projects never show on the landing.
// Penalty Geometry lives inside the ML in Football grid, not as its own card.
const PROJECTS = [
  { id: "anonymiser", index: "01", title: "Legal Text Anonymiser",

    tags: ["NLP", "NER", "RoBERTa"], year: 2026, q: "Q2" },
  { id: "quoteguard", index: "02", title: "QuoteGuard",
    href: "showcase-quoteguard.html",
    subtitle: "Guardrailed, grounded RAG over an insurance policy",

    chart: "assets/quoteguard/overview_guardrails.png",

  { id: "touchline", index: "07", title: "Touchline",

    tags: ["Agents", "Tool Use", "Text-to-SQL", "Evals"], year: 2026, q: "Q2" },
  { id: "policydesk", index: "09", title: "PolicyDesk",
    href: "projects/policydesk.html",
    subtitle: "A LangGraph multi-agent research desk over an insurance policy",
    hook: "A planner, researchers and a critic. *Does multi-agent actually win?*",
    chips: ["better grounded: 91 vs 82%", "7× the cost"],
    chart: "assets/policydesk/quality_by_type.png",
    color: "oklch(52% 0.14 295)", status: "wip", priority: 3.2,
    tags: ["LangGraph", "PydanticAI", "Multi-agent", "RAG"], year: 2026, q: "Q2" },
  { id: "redteam", index: "08", title: "Red-Team Lab",
    href: "projects/redteam.html",
    subtitle: "Attacking an LLM SQL agent — what a guardrail actually stops",
    hook: "A guardrail isn't secure or insecure. *Guarded against what?*",
    chips: ["writes 100% blocked", "leaks 0% blocked"],
    chart: "assets/redteam/breach_by_family.png",
    color: "oklch(53% 0.17 28)", status: "wip", priority: 3.5,
    tags: ["Security", "Prompt Injection", "Guardrails", "Red-Team"], year: 2026, q: "Q2" },
  { id: "explorations", index: "06", title: "ML in Football — Explorations",
    href: "explorations/index.html",
    subtitle: "A grid of self-contained football data explorations",
    hook: "Football questions, each *taken as far as the data will go*.",
    chips: ["5 pieces", "D3 · no build"],
    chart: "assets/explorations-thumb.svg",
    color: "oklch(54% 0.10 190)", status: "live", priority: 4,
    tags: ["D3", "Football", "Game Theory"], year: 2026, q: "Q2" },
  { id: "blackjack", index: "03", title: "Blackjack Simulator",
    subtitle: "Monte Carlo strategy analysis",

    chips: ["1.6M hands", "+1.02% ROR"],

  { id: "kaggle", index: "04", title: "Kaggle Competitions",
    subtitle: "Competitive ML — tabular, NLP, vision",
    color: "oklch(52% 0.14 50)", status: "planned", priority: 99,
    tags: ["Kaggle", "ML", "XGBoost"], year: 2026, q: "Q1" },
];

// The featured pool: every live project, ranked by priority.
const FEATURED_ALL = PROJECTS
  .filter(p => p.status !== "planned")
  .sort((a, b) => (a.priority ?? 99) - (b.priority ?? 99));
const DEFAULT_LIMIT = 7;

// Skills cell — grouped stack, evidenced by the projects above.
const SKILLS = [
  { group: "ml_nlp", items: ["RoBERTa fine-tuning (NER)", "HuggingFace Transformers", "spaCy", "RAG & retrieval (BM25, cross-encoders)", "guardrails & adversarial evals"] },
  { group: "statistics", items: ["bootstrap & Wilson CIs", "logistic regression", "Kaplan–Meier survival", "hypothesis testing", "Monte Carlo simulation"] },
  { group: "engineering", items: ["Python", "pytest + GitHub Actions CI", "D3 & front-end", "Gradio / HF Spaces", "reproducible pipelines"] },
];

// ─── Notebook cell wrapper ────────────────────────────────────────────────────
function Cell({ n, type, children, visible }) {
  return (
    <div style={{
      display: "flex", gap: 16,
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(10px)",
      transition: "all 0.5s ease"
    }}>
      <div style={{
        fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-dim)",
        paddingTop: 14, minWidth: 64, textAlign: "right"
      }}>
        {type === "in" ? `In [${n}]:` : type === "out" ? `Out[${n}]:` : ""}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>{children}</div>
    </div>
  );
}

function CodeLine({ children }) {
  return (
    <div style={{
      background: "rgba(0,0,0,0.03)",
      borderLeft: "3px solid var(--accent)",
      padding: "12px 18px", borderRadius: 4,
      fontFamily: "var(--font-mono)", fontSize: 13, lineHeight: 1.7
    }}>{children}</div>
  );
}

const kw = (t) => <span style={{ color: "#a35f2e" }}>{t}</span>;
const str = (t) => <span style={{ color: "#5b8a3a" }}>{t}</span>;

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(0);
  const [groupHover, setGroupHover] = useState(false);
  // The featured(limit=…) argument is genuinely editable by the visitor.
  const [limitText, setLimitText] = useState(String(DEFAULT_LIMIT));
  const parsed = parseInt(limitText, 10);
  const featured = isNaN(parsed) || parsed < 1
    ? []
    : FEATURED_ALL.slice(0, Math.min(parsed, FEATURED_ALL.length));

  useEffect(() => {
    const timers = [];
    for (let i = 1; i <= 12; i++) {
      timers.push(setTimeout(() => setStep(i), i * 180));
    }
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={{ minHeight: "100vh", padding: "32px clamp(24px, 5vw, 64px) 80px" }}>
      {/* Notebook header */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        marginBottom: 32, paddingBottom: 14, borderBottom: "1px solid var(--border)",
        maxWidth: 1100, margin: "0 auto 32px"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>

            <div style={{ width: 11, height: 11, borderRadius: "50%", background: "#e8c878" }} />
            <div style={{ width: 11, height: 11, borderRadius: "50%", background: "#a8c878" }} />
          </div>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-muted)" }}>
            portfolio.ipynb

          ● Python 3.11 — Idle
        </span>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 26, maxWidth: 1100, margin: "0 auto" }}>

        {/* Cell 1: Bio header */}
        <Cell n=" " type="" visible={step >= 1}>
          <div style={{ display: "flex", gap: 32, alignItems: "flex-start", flexWrap: "wrap" }}>
            {/* Monogram avatar (swap for <img> when a photo is ready) */}
            <div style={{
              width: 140, height: 140, borderRadius: 18,
              background: "linear-gradient(135deg, oklch(74% 0.09 55), oklch(55% 0.13 45))",
              flexShrink: 0,
              display: "flex", alignItems: "center", justifyContent: "center",
              border: "1px solid var(--border)",
              boxShadow: "0 6px 20px oklch(55% 0.13 45 / 0.28)",
              position: "relative", overflow: "hidden"
            }}>

                position: "absolute", inset: 0,
                background: "repeating-linear-gradient(45deg, transparent, transparent 9px, rgba(255,255,255,0.05) 9px, rgba(255,255,255,0.05) 10px)"

              <span style={{
                zIndex: 1, fontFamily: "var(--font-display)", fontSize: 50, fontWeight: 700,
                color: "#fff", letterSpacing: "-0.02em", textShadow: "0 2px 8px rgba(0,0,0,0.15)"
              }}>WC</span>
            </div>

            <div style={{ flex: 1, minWidth: 280, paddingTop: 6 }}>
              <h1 style={{
                fontSize: "clamp(40px, 5vw, 56px)", fontWeight: 700,
                letterSpacing: "-0.03em", lineHeight: 1.05, marginBottom: 10
              }}>
                William Catt
              </h1>
              <p style={{ fontSize: 16, color: "var(--text-muted)", fontWeight: 300, lineHeight: 1.6, marginBottom: 16 }}>
                I'm a data scientist who likes building the whole thing: taking a vague question through to a model and then to something you can actually click on. I care about evaluating that work properly, which includes reporting the experiments that didn't work out. Most of what I do sits in NLP and LLM systems, predictive modelling, and simulation. Recently that's been a PII redaction pipeline for legal text, a guardrailed RAG chatbot over an insurance policy, and a Monte Carlo lab for betting strategies. More underway.
              </p>
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--accent)" }}>
                {/* CV slot — drop a PDF at assets/william-catt-cv.pdf and uncomment:
                <a href="assets/william-catt-cv.pdf" target="_blank" rel="noreferrer" style={{ fontWeight: 600 }}>CV (PDF) ↓</a>
                <span style={{ color: "var(--text-dim)" }}>·</span> */}
                <a href="https://github.com/WillCatt" target="_blank" rel="noreferrer">github.com/WillCatt ↗</a>
                <span style={{ color: "var(--text-dim)" }}>·</span>
                <a href="https://www.linkedin.com/in/william-catt/" target="_blank" rel="noreferrer">linkedin.com/in/william-catt ↗</a>
                <span style={{ color: "var(--text-dim)" }}>·</span>
                <a href="mailto:wcatt98@gmail.com">wcatt98@gmail.com</a>

          <CodeLine>

              value={limitText}
              onChange={e => setLimitText(e.target.value.replace(/[^0-9]/g, "").slice(0, 2))}
              aria-label="Number of featured projects to show — editable"
              style={{
                width: `${Math.max(1, limitText.length)}ch`,
                background: "transparent", border: "none",
                borderBottom: "1px dashed var(--accent)",
                fontFamily: "var(--font-mono)", fontSize: 13, lineHeight: 1.7,
                color: "#5b8a3a", textAlign: "center", outline: "none", padding: 0
              }} />)
            <span style={{ color: "var(--text-dim)", marginLeft: 14 }}># ← editable, try it</span>
          </CodeLine>
        </Cell>

        {/* Cell 4: Project grid output */}
        <Cell n="2" type="out" visible={step >= 4}>
          {featured.length === 0 ? (
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--text-muted)", padding: "12px 4px" }}>
              []  <span style={{ color: "var(--text-dim)" }}># no projects — try limit={DEFAULT_LIMIT}</span>
            </div>
          ) : (
          <div>
            <div
              onMouseEnter={() => setGroupHover(true)}
              onMouseLeave={() => setGroupHover(false)}
              style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14, alignItems: "start" }}>
              {featured.map((p, i) => (
                <ProjectCard key={p.id} p={p} visible={step >= 4 + i * 0.3} expanded={groupHover} />
              ))}
            </div>
            {parsed > FEATURED_ALL.length && (
              <div style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--text-dim)", marginTop: 10 }}>
                # all {FEATURED_ALL.length} live projects shown — projects.all() has the full archive
              </div>
            )}
          </div>
          )}
        </Cell>

        {/* Cell 5: View all */}
        <Cell n="3" type="in" visible={step >= 7}>
          <CodeLine>
            projects.all()  <span style={{ color: "var(--text-muted)" }}># view full archive</span>
          </CodeLine>
        </Cell>

        <Cell n="3" type="out" visible={step >= 8}>
          <a href="all-projects.html" style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "20px 24px", borderRadius: 10,
            background: "var(--card)", border: "1px solid var(--border)",
            transition: "all 0.2s ease"
          }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 6px 18px rgba(0,0,0,0.05)"; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
          >

              <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--accent)", letterSpacing: "0.14em", marginBottom: 4 }}>

                Searchable list of every project, past and present
              </div>
            </div>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 18, color: "var(--accent)" }}>→</span>
          </a>
        </Cell>

        {/* Cell 6: Skills */}
        <Cell n="4" type="in" visible={step >= 9}>
          <CodeLine>
            me.skills(<span style={{ color: "var(--text-muted)" }}>grouped</span>={str("True")})
          </CodeLine>
        </Cell>

        <Cell n="4" type="out" visible={step >= 10}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {SKILLS.map(s => (
              <div key={s.group} style={{ display: "flex", gap: 14, alignItems: "baseline", flexWrap: "wrap" }}>

            me.contact()  <span style={{ color: "var(--text-muted)" }}># open to junior data scientist roles</span>
          </CodeLine>
        </Cell>

        <Cell n="5" type="out" visible={step >= 12}>
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            flexWrap: "wrap", gap: 16,
            padding: "22px 24px", borderRadius: 10,
            background: "var(--accent-soft)", border: "1px solid var(--border)"

            <div>
              <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 3 }}>Like what you see?</div>

                I'm looking for a junior data scientist role — happy to walk through any of these projects.
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <a href="mailto:wcatt98@gmail.com" style={{
                fontFamily: "var(--font-mono)", fontSize: 12, padding: "10px 18px",
                borderRadius: 7, background: "var(--accent)", color: "#fff",
                letterSpacing: "0.04em"
              }}>email me</a>
              <a href="https://www.linkedin.com/in/william-catt/" target="_blank" rel="noreferrer" style={{
                fontFamily: "var(--font-mono)", fontSize: 12, padding: "10px 18px",
                borderRadius: 7, border: "1px solid var(--accent)", color: "var(--accent)",
                letterSpacing: "0.04em"
              }}>linkedin ↗</a>
            </div>
          </div>
        </Cell>

      </div>
    </div>

}

// Render a hook string, colouring any *emphasised* spans in the project hue.
function renderHook(hook, color) {
  return hook.split("*").map((part, i) =>
    i % 2 === 1
      ? <span key={i} style={{ color, fontWeight: 500 }}>{part}</span>
      : <React.Fragment key={i}>{part}</React.Fragment>
  );
}

function ProjectCard({ p, visible, expanded }) {
  const isLive = p.status === "live";
  const hasDetail = !!(p.video || p.chart);
  const open = hasDetail && expanded;
  return (
    <a href={p.href || `projects/${p.id}.html`}
       style={{
         position: "relative", display: "flex", flexDirection: "column",
         padding: "20px 22px", borderRadius: 12,
         background: "var(--card)",
         border: "1px solid var(--border)",
         borderLeft: `3px solid ${p.color}`,
         transition: "all 0.25s ease",
         transform: open ? "translateY(-4px)" : "translateY(0)",
         boxShadow: open ? `0 14px 30px ${p.color.replace(")", " / 0.20)")}` : "0 2px 6px rgba(0,0,0,0.03)",
         opacity: visible ? (isLive ? 1 : 0.9) : 0,
         minHeight: 176
       }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: p.color, letterSpacing: "0.12em", fontWeight: 500 }}>
          {p.index}
        </span>
        <span className={`status-pill ${p.status}`}>
          <span className={`status-dot ${p.status}`}></span>
          {isLive ? "LIVE" : p.status === "wip" ? "IN PROGRESS" : "PLANNED"}
        </span>
      </div>
      <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 6, letterSpacing: "-0.01em" }}>
        {p.title}
      </div>
      <div style={{ fontSize: 13.5, color: p.hook ? "var(--text)" : "var(--text-muted)", lineHeight: 1.5 }}>
        {p.hook ? renderHook(p.hook, p.color) : p.subtitle}
      </div>
      {p.chips && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
          {p.chips.map(c => (
            <span key={c} style={{
              fontFamily: "var(--font-mono)", fontSize: 10, padding: "4px 9px", borderRadius: 5,
              color: p.color,
              background: p.color.replace(")", " / 0.09)"),
              border: `1px solid ${p.color.replace(")", " / 0.22)")}`,
              letterSpacing: "0.03em"
            }}>{c}</span>
          ))}
        </div>
      )}
      {hasDetail && (
        <div style={{
          maxHeight: open ? 200 : 0, opacity: open ? 1 : 0, marginTop: open ? 14 : 0,
          overflow: "hidden",
          transition: "max-height 0.42s cubic-bezier(.4,0,.2,1), opacity 0.3s ease, margin-top 0.42s ease"
        }}>
          <div style={{ height: 1, background: "var(--border)", marginBottom: 12 }} />
          {p.video ? (
            <video src={p.video} poster={p.poster} autoPlay muted loop playsInline preload="metadata" style={{
              width: "100%", height: 158, objectFit: "cover", objectPosition: "center",
              background: "var(--bg)", borderRadius: 8, border: "1px solid var(--border)", display: "block"
            }} />
          ) : (
            <img src={p.chart} alt={`${p.title} — key result`} loading="lazy" style={{
              width: "100%", height: 150, objectFit: "contain", objectPosition: "center",
              background: "#fff", padding: 6, borderRadius: 8, border: "1px solid var(--border)", display: "block"
            }} />
          )}
        </div>
      )}
      <div style={{ marginTop: "auto", paddingTop: 16, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
          {p.tags.map(t => (
            <span key={t} style={{
              fontFamily: "var(--font-mono)", fontSize: 9, padding: "3px 8px",
              background: "rgba(0,0,0,0.04)", borderRadius: 3, color: "var(--text-muted)",
              letterSpacing: "0.04em"
            }}>{t}</span>
          ))}
        </div>
        <span style={{
          fontFamily: "var(--font-mono)", fontSize: 16, color: p.color, alignSelf: "center",
          opacity: open ? 1 : 0, transform: open ? "translateX(0)" : "translateX(-6px)",
          transition: "all 0.22s ease", flexShrink: 0, marginLeft: 8
        }}>→</span>
      </div>
    </a>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
