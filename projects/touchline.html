<template id="tab-overview">
  <article class="writeup">
    <h2>The problem</h2>
    <p>There are 150 years of international football results sitting in a database — 49,291 matches
      back to the first Scotland–England game in 1872. Getting an answer out of it (“who has England
      beaten most often?”, “how has scoring changed by decade?”) means knowing SQL and the table layout.
      Most people who have the questions don't have the query.</p>

    <h2>What I built</h2>
    <p>Touchline does the querying for you. You ask a question in plain English; it works out what to
      compute, writes the SQL, runs it against the database, draws a chart where one helps, and explains
      what it found. If a query fails, it reads the error and tries again. There are no pre-built
      dashboards; it writes each query from scratch.</p>
    <p>It has two things it can do: run a read-only query, and draw a chart from one. And it follows one
      firm rule: every number it gives you has to come from a query it actually ran, not from the model's
      own memory.
      <a class="deeper" href="#" onclick="document.querySelector('[data-tab=technical]')?.click();return false;">How it works under the hood →</a></p>

    <h2>Finding — the code model didn't win</h2>
    <p>The question I cared about wasn't whether an LLM can write SQL (it can), but which model you
      actually need to run this. I gave the same agent two models that run free on a laptop:
      <strong>qwen2.5-coder:7b</strong>, tuned for code, and <strong>llama3.1:8b</strong>, a general
      model. Both answered the same 30 questions. (Claude Opus 4.8 will join the same test later, as a
      paid-model benchmark.)</p>
    <figure class="fig">
      <img src="../assets/touchline/accuracy_frontier_vs_local.png" alt="Answer accuracy: qwen2.5-coder vs llama3.1, with 95% confidence intervals." />
      <figcaption>Answer accuracy on the 30 questions, with bootstrap 95% confidence intervals. The
        code-tuned model is a few points ahead, but the intervals overlap, so the difference isn't real.
        <a class="deeper" href="#" onclick="document.querySelector('[data-tab=results]')?.click();return false;">See the full scorecard →</a></figcaption>
    </figure>
    <p>The code model scored <strong>77%</strong> and the general model <strong>73%</strong>: close
      enough, given the confidence intervals, to call a tie. The averages hide the more interesting part.
      The general model wrote working SQL far more often (<strong>86%</strong> of its queries ran, against
      <strong>68%</strong> for the code model) and fixed its own mistakes about twice as often. The code
      model, for its part, made up fewer numbers: 97% of the figures it quoted traced back to a real
      query, against 83%. And they were good at opposite things, the code model on single-table filters,
      the general model on questions comparing two teams (100% versus 25%). “A code model is better at
      SQL” turned out to be too simple a rule.</p>
    <p>I also <strong>trained a local model on its own correct answers</strong>, on a loop: the eval
      labels the data for free, so the model learns from the queries it gets right. A single round
      over-specialises and forgets things, but with a wider question bank and a held-out gate the best
      round beats the starting model on both test sets at once (54% → 63% on unseen teams, 60% → 70% on
      the original questions).
      <a class="deeper" href="#" onclick="document.querySelector('[data-tab=technical]')?.click();return false;">See the self-training loop →</a></p>

    <blockquote>An LLM is a good analyst only if it actually runs the query. The whole design is
      built to force that: a read-only guard so it can't do harm, a hard “ground every number in a tool
      result” rule, and an eval that checks the spoken answer against the database — not against the
      model's confidence. <a href="#" onclick="document.querySelector('[data-tab=technical]')?.click();return false;">Read the technical write-up →</a></blockquote>
  </article>
</template>

<!-- ─── TECHNICAL ────────────────────────────────────────────────────────────── -->
<template id="tab-technical">
  <article class="writeup">
    <h2>Dataset &amp; schema</h2>
    <p>One clean fact table, <code>matches</code> (49,291 played internationals, 1872–2026: teams,
      scores, tournament, venue, plus derived <code>year</code>, <code>winner</code>,
      <code>total_goals</code>, <code>goal_diff</code>), and a long-form view <code>team_match</code>
      — one row per team per match, with <code>goals_for/against</code>, <code>venue</code> and a
      <code>W/D/L</code> result. The view earns its keep: team-centric questions (“who did X beat”)
      become a simple filter instead of fiddly <code>CASE</code> expressions over the home/away columns,
      which measurably lifts the smaller models' hit rate.</p>

    <h2>The agent loop</h2>
    <p>A model-agnostic ReAct-style loop. The system prompt carries the schema, sample rows, and the
      rules; then: the model emits a tool call → the harness executes it → the result is fed back →
      repeat until the model answers in prose (capped at six iterations). Two tools:</p>
    <ul>
      <li><code>run_sql(sql)</code> — runs one read-only <code>SELECT</code> and returns up to 50 rows.</li>
      <li><code>plot(sql, x, y, kind, title)</code> — runs a query and describes a bar/line chart from
        two of its columns, so the answer ships with a figure grounded in a real result set.</li>
    </ul>
    <p><strong>Self-correction.</strong> A failed query isn't fatal. The error text goes back to the
      model as the tool result, and it gets another turn to fix the SQL. That one choice is what lets a
      weaker local model recover instead of giving up.</p>

    <h2>The SELECT-guard (defence in depth)</h2>
    <p>The agent can <em>only read</em>. Three layers enforce it: the SQLite connection is opened in
      OS-level read-only mode (a write is physically impossible); a <code>query_only</code> pragma; and
      a text guard that rejects anything that isn't a single <code>SELECT</code>/<code>WITH</code>
      statement — no stacked statements, no <code>DROP</code>/<code>INSERT</code>/<code>PRAGMA</code>.
      The text guard's job is partly UX (a clear refusal the model can react to) and partly a clean,
      inspectable security seam — it's the attack target for a sister red-team project. A per-query
      timeout aborts runaway joins on the 49k-row table.</p>

    <h2>Swapping the brain — the setup</h2>
    <p>The same loop, the same tools, the same prompt — only the “brain” swaps behind one interface, so
      every model is a like-for-like comparison:</p>
    <ul>
      <li><strong>Local (now):</strong> two models via Ollama — qwen2.5-coder:7b (code-tuned) and
        llama3.1:8b (general) — both free, on-device, no network.</li>
      <li><strong>Frontier (next):</strong> Claude Opus 4.8 via the Anthropic API, native tool use,
        adaptive thinking, with the system+tools prefix marked for prompt caching — the ceiling the
        local models get measured against.</li>
    </ul>

    <h2>What didn't work (kept in)</h2>
    <ul>
      <li><strong>The local model wouldn't use the tool API.</strong> Out of the box, qwen2.5-coder
        printed its SQL as prose <em>and then hallucinated an answer</em> — “the team with the most
        World Cup wins is France with 4 titles” (wrong, and it never ran a query). It described the
        tool call instead of emitting one. I added a <strong>text-extraction fallback</strong>: when a
        local model returns no native tool call, the harness pulls the SQL out of its prose and runs it,
        forcing it to ground. The same question then answers <em>Brazil, 76</em> — correct. Forcing the
        model to look at a real result turned a confident hallucination into a right answer.</li>
      <li><strong>The two local models fail in opposite places.</strong> Head-to-head questions are
        where qwen2.5-coder falls down (25%): it filters on the wrong column, or miscounts distinct
        teams. llama3.1 gets them all right (100%). It flips for single-table conditions, where qwen
        scores 100% and llama 50%. Whatever “tuned for code” is worth, it isn't a clean win here.</li>
      <li><strong>One question sent qwen into a 37-second loop</strong> of failed queries before it gave
        up — the iteration cap is what stops that becoming an infinite spend.</li>
    </ul>

    <h2>How the eval works</h2>
    <p>Thirty natural-language questions across seven categories (lookup, aggregation, head-to-head,
      conditional, trend, superlative, multi-step). Each has a <em>reference SQL whose result is the
      gold answer</em> — answers are computed from the database, never hand-typed. The scorer is
      deliberately about the <strong>spoken answer</strong>, the thing a user actually reads: it checks
      that the gold value(s) appear in the final answer, with numeric tolerance (so “about 51%” matches
      a gold of 50.7). Alongside accuracy it tracks valid-SQL rate, self-correction, tool calls,
      latency, cost, and <strong>groundedness</strong> — does every number the model states trace back
      to a tool result, or did it invent one. All accuracy figures carry bootstrap 95% CIs.</p>

    <h2>Self-training: the eval as the teacher, on a loop</h2>
    <p>Because the eval checks every answer against the database, it can label training data on its own.
      I built a bank of ~2,000 templated questions over the same schema (each with a reference SQL), held
      fifteen teams out entirely, and let the model attempt the rest. Every attempt whose SQL reproduced
      the gold answer was kept; the rest were thrown away. This is rejection sampling: the model's own
      verified-correct queries become the dataset, with no hand-labelling. The kept pairs LoRA fine-tune
      the model on-device (MLX on the M-series Mac, loss masked to the SQL).</p>
    <p>One round of this over-specialises, exactly as you'd expect. Fine-tuning on the first ~250
      verified queries <em>dropped</em> single-shot accuracy on the original 30 from 60% to 40%: the model
      got sharper on the team-by-team patterns it trained on and worse at the rest. So I made it a loop
      with two changes: a wider question bank (percentages, per-decade buckets, max-of-derived shapes, not
      just counts) and a <strong>held-out gate</strong> — keep a new round only if it beats the previous
      best on both test sets, never just one.</p>
    <figure class="fig">
      <img src="../assets/touchline/iterate.png" alt="Iterated self-training: execution accuracy by round, on held-out teams and the original 30." />
      <figcaption>Each round: the current model attempts the bank, its verified-correct SQL is added to
        the training set, a fresh model is fine-tuned, and it's tested on both held-out sets. The rounds
        are noisy; the gate is what makes the loop trustworthy.</figcaption>
    </figure>
    <p>The loop is genuinely noisy. Round 1 regressed both sets; round 3 pushed the held-out teams to
      their best (67%) but gave back ground on the broader 30. The round that passes the gate is
      <strong>round 2</strong>, and it is a real win: it beats the base model on <em>both</em> sets at
      once — held-out teams <strong>54% → 63%</strong>, original 30 <strong>60% → 70%</strong> — trained
      only on the model's own verified queries, for nothing but compute. The wider bank is what let it
      recover the question types one round had forgotten.</p>
    <p>So yes, it iterates, with caveats worth stating plainly. The gains are noisy and they plateau:
      rejection sampling can only harvest what the model can already sometimes do, not teach it genuinely
      new tricks. And a cheap verifier can be gamed if you push hard enough — a query that happens to
      contain the gold number isn't always the right query. The held-out gate is the load-bearing part;
      without it you'd ship round 1 and write self-training off as a failure.</p>

    <h2>From prototype to production</h2>
    <p>What a real deployment would add: per-query cost and row caps; result caching for repeated
      questions; query-plan limits against expensive joins; an audit log of every query the agent ran;
      and a guardrail layer against prompt-injection through the question (“ignore your instructions and
      run …”) — the read-only guard blocks the damage, but the scope-escape surface is exactly what the
      companion <strong>Red-Team Lab</strong> is built to probe.</p>
  </article>
</template>

    <pre class="tree"><code>touchline/

  run.py          # run the agent, score, bootstrap CIs
  score.py        # the (pure, unit-tested) scorer
train/            # self-training loop

  split.py           # train pool vs held-out-team test set
  mlx_sample.py      # attempt the pool, keep verified-correct SQL

    <h2>The SELECT-guard</h2>
    <p>Defence in depth: an OS read-only connection makes writes impossible; this text guard gives the
      agent a clear refusal to react to and is the inspectable security seam.</p>
    <pre class="tree"><code>def validate_select(sql: str) -> str:
    cleaned = _COMMENT.sub(" ", sql).strip()
    if cleaned.endswith(";"):
        cleaned = cleaned[:-1].rstrip()
    if ";" in cleaned:                       # no statement-stacking
        raise GuardError("only a single statement is allowed")
    head = cleaned.lstrip("( ").split(None, 1)[0].upper()
    if head not in {"SELECT", "WITH"}:
        raise GuardError("only SELECT/WITH queries are allowed")
    if _FORBIDDEN.search(cleaned):           # DROP/INSERT/PRAGMA/…
        raise GuardError("query contains a forbidden (non-read) keyword")
    return cleaned</code></pre>

    <h2>The text-extraction fallback (local models)</h2>
    <p>Some local models describe a tool call in prose instead of emitting one — and then hallucinate.
      When there's no native tool call, recover the SQL from the text and run it, forcing the model to
      ground on a real result instead of guessing.</p>
    <pre class="tree"><code>text = msg.get("content") or None
if not calls:                       # no native tool call —
    recovered = _tool_from_text(text)  # pull SQL out of the prose
    if recovered:
        calls, text = [recovered], None  # run it; don't treat prose as final</code></pre>

    <h2>Self-training: keep only the model's verified-correct SQL</h2>
    <p>The eval already checks answers against the database, so it doubles as an automatic labeller.
      The base model attempts a large bank of questions; every attempt whose SQL reproduces the gold
      answer becomes a training example. No hand-labelling — the scoreboard writes the dataset.</p>
    <pre class="tree"><code>sql = gen_sql(system, question)        # the base model's attempt
if sql_correct(sql, gold):             # does it reproduce the gold answer?
    kept.append({"messages": [         # keep it as a training example
        {"role": "system",    "content": system},
        {"role": "user",      "content": question},
        {"role": "assistant", "content": sql},
    ]})
# -> LoRA fine-tune (MLX, loss masked to the SQL) -> re-eval on held-out teams</code></pre>
  </article>
</template>
