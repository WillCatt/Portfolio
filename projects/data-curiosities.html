<template id="tab-overview">
  <article class="writeup">
    <h2>The idea</h2>
    <p>A running set of small statistical curiosities — the kind of result that makes you do a
      double-take whether or not you do data for a living. Each piece takes one counterintuitive idea,
      sells it with a chart you can argue with, explains the mechanism underneath, and then shows the
      same effect biting in a real, published study. This is piece 01.</p>

    <h2>Piece 01 — Simpson's Paradox</h2>
    <p>Picture a health study. You plot how much people exercise against their fasting blood sugar (a
      diabetes-risk marker) and draw the best-fit line through the cloud of points.</p>
    <figure class="fig">
      <img src="../assets/data-curiosities/fig1_pooled.png" alt="Scatter of weekly exercise versus fasting blood sugar with a single upward trend line." />
      <figcaption>The line slopes up. Taken at face value, the more people exercise, the
        <em>higher</em> their blood sugar. Exercise looks bad for you.</figcaption>
    </figure>
    <p>That can't be right, and it isn't. Colour the very same points by age band and fit a line through
      each group on its own:</p>
    <figure class="fig">
      <img src="../assets/data-curiosities/fig2_split.png" alt="The same scatter coloured into three age bands, each with a downward trend line, while the pooled line slopes up." />
      <figcaption>Inside every age band the line slopes <em>down</em>: more exercise, lower blood sugar,
        exactly as you'd expect. The upward pooled line (now dashed) was an illusion.</figcaption>
    </figure>
    <p>Nothing about the data changed between the two pictures. The only difference is whether we looked
      at age. Older people here both exercise more <em>and</em> run higher blood sugar, so when you ignore
      age, exercise quietly stands in for age and the trend flips. A relationship that's true in every
      subgroup can reverse in the pooled total. That's Simpson's paradox.
      <a class="deeper" href="#" onclick="document.querySelector('[data-tab=technical]')?.click();return false;">Why it reverses, in detail →</a></p>

    <h2>It isn't just a teaching toy</h2>
    <p>In 1986 Charig and colleagues compared two kidney-stone treatments in the <em>BMJ</em>. Keyhole
      surgery won overall (83% vs 78%). Split by stone size and it flips: open surgery won for small
      stones <em>and</em> for large stones, yet lost the total — because the easy cases had been steered
      toward keyhole, flattering its average.</p>
    <figure class="fig">
      <img src="../assets/data-curiosities/fig3_kidney.png" alt="Grouped bar chart: open surgery beats keyhole surgery for both small and large stones, but loses on the overall success rate." />
      <figcaption>Open surgery wins both subgroups but loses overall. Stone size is the confounder here,
        playing the role age played above (Charig et al. 1986).</figcaption>
    </figure>

    <blockquote>An average pooled over groups can contradict every group it's made of. Before you trust a
      trend, ask what else is changing along that x-axis — there's usually a lurking variable doing the
      talking. <a href="#" onclick="document.querySelector('[data-tab=app]')?.click();return false;">Try the
      interactive →</a></blockquote>

    <p style="color:var(--text-muted)">More pieces are queued: Anscombe's quartet and the Datasaurus
      (identical summary stats, wildly different shapes), survivorship bias, the base-rate fallacy, and
      Berkson's paradox.</p>
  </article>
</template>

<!-- ─── TECHNICAL ────────────────────────────────────────────────────────────── -->
<template id="tab-technical">
  <article class="writeup">
    <h2>How the illustration is built</h2>
    <p>The exercise/blood-sugar figures use synthetic data, generated with a fixed seed so the effect is
      clean enough to see the mechanism rather than fight the noise. The confounder is wired in on
      purpose. Three age bands, and within each one:</p>
    <ul>
      <li>the band's <strong>baseline blood sugar rises with age</strong> (88 → 96 → 104 mg/dL), and</li>
      <li>the band's <strong>typical exercise also rises with age</strong> (its cloud sits further right),</li>
      <li>while <strong>within</strong> a band, more exercise genuinely <em>lowers</em> blood sugar
        (slope ≈ −1.6 mg/dL per weekly hour).</li>
    </ul>
    <p>Fit a line per band and every slope comes out negative (−1.5, −1.9, −2.3). Fit one line to the
      pool and it comes out at <strong>+2.4</strong>. The pooled slope isn't measuring exercise at all;
      it's tracing the diagonal march of the three age clouds up and to the right. Hold age fixed by
      splitting, and exercise gets to show its real, downward effect.</p>

    <h2>Why a pooled trend can reverse</h2>
    <p>The pooled line is a weighted average of within-group relationships plus the between-group
      arrangement of the groups. When the groups are arranged so that the variable on the x-axis is
      correlated with group membership (here, more exercise ⇒ older band), the between-group term can
      dominate and point the opposite way to every within-group term. There's no statistical test that
      tells you which view is "correct": deciding whether to read the pooled trend or the subgroups is a
      causal question about <em>why</em> the confounder is there, not a numerical one. Blyth named the
      effect in 1972; the contingency-table version goes back to Simpson in 1951.</p>

    <h2>The same effect in real studies</h2>
    <p><strong>Kidney stones (Charig et al. 1986).</strong> Open surgery vs percutaneous nephrolithotomy:</p>
    <table class="metrics">
      <thead><tr><th>Group</th><th>Open surgery</th><th>Keyhole (PCNL)</th></tr></thead>
      <tbody>
        <tr><td>Small stones</td><td class="f1">93% (81/87)</td><td>83% (234/270)</td></tr>
        <tr><td>Large stones</td><td class="f1">73% (192/263)</td><td>69% (55/80)</td></tr>
        <tr class="overall"><td>Overall</td><td>78% (273/350)</td><td class="f1">83% (289/350)</td></tr>
      </tbody>
    </table>
    <p class="run-note">Open surgery is better in both rows yet worse overall. The confounder is
      treatment assignment: roughly three-quarters of the small (easy) stones went to keyhole and
      three-quarters of the large (hard) stones went to open surgery, so keyhole's overall figure was
      built from an easier caseload.</p>
    <p><strong>Berkeley admissions (Bickel, Hammel &amp; O'Connell 1975).</strong> Berkeley's 1973
      graduate intake looked biased against women in aggregate, yet department by department it slightly
      favoured them. Women had applied in larger numbers to the most competitive departments, where
      everyone's odds were low. Same shape, this time on admissions instead of survival.</p>

    <h2>How not to get fooled</h2>
    <ul>
      <li>Plot the subgroups, not just the pooled line. If a relationship looks surprising, look at what's
        different about the points at each end.</li>
      <li>Ask what else changes along the x-axis. Here, age moved with exercise; there's the confounder.</li>
      <li>Treat any headline rate as a mixture, and check whether the mixing proportions differ between
        the things you're comparing. That difference is what flips the total.</li>
    </ul>

    <h2>The series</h2>
    <p>Each piece is a self-contained folder (data generator, palette-matched figures, a short cited
      write-up, and a small interactive where one earns its place), cloned from this one. Queued next:
      Anscombe's quartet and the Datasaurus dozen, survivorship bias (Wald's bombers), the base-rate
      fallacy, and Berkson's paradox / the friendship paradox.</p>

    <pre class="tree"><code>BG, INK, MUTED, GRID = "#faf8f4", "#1a1714", "#7a6e63", "#e6ded2"

    })</code></pre>

    <h2>The confounder, wired in on purpose</h2>
    <p>Older bands get a higher baseline blood sugar and a higher exercise centre, while exercise lowers
      blood sugar within each band. That single arrangement is what makes the pooled slope flip positive.</p>
    <pre class="tree"><code>BANDS = [  # label,       exercise_centre, baseline_glucose
    ("Age 20–35", 2.0,  88.0),
    ("Age 36–50", 4.2,  96.0),
    ("Age 51–65", 6.4, 104.0),
]
WITHIN_SLOPE = -1.6   # mg/dL per extra weekly hour — the *true* effect

for i, (_label, ex_centre, base) in enumerate(BANDS):
    ex = rng.normal(ex_centre, 1.0, N).clip(0.2, None)
    glucose = base + WITHIN_SLOPE * (ex - ex_centre) + rng.normal(0, 3.0, N)
# pooled fit -> +2.4  ;  per-band fits -> -1.5, -1.9, -2.3</code></pre>
  </article>
