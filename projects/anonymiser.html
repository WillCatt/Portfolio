<!-- OVERVIEW: stakeholder-facing. Plain language, no jargon, simple charts. -->
<template id="tab-overview">
  <article class="writeup">
    <h2>The problem</h2>
    <p>Law firms want their lawyers using AI to summarise cases, draft memos and search old files. But client information is confidential — feeding a privileged document into a third-party AI tool can breach regulations, contracts and professional duty all at once.</p>
    <p>The obvious fix is to <em>strip out the names</em> before sending anything to the AI. This project asks one question: <strong>is that actually enough?</strong> The answer is no — and the interesting part is <em>why</em>.</p>

    <h2>Finding 1 — off-the-shelf tools miss too much</h2>
    <p>I tested the strongest free, general-purpose name-detector on 555 real court judgments. It missed or mis-flagged roughly <strong>two in five</strong> pieces of sensitive information — and caught <strong>none</strong> of the case file numbers, because it was never taught what one looks like.</p>
    <p>Re-training the same kind of model on legal documents specifically closed most of that gap, nearly doubling its reliability.</p>
    <img src="../assets/overview_accuracy.png" alt="Reliability rises from 57 to 85 out of 100 after training on legal documents." />

    <h2>Finding 2 — removing names isn't enough</h2>
    <p>Here's the part that surprised me. Even if you perfectly delete every name, date and ID number, the <em>ordinary</em> details left behind — someone's age, town, job, nationality — are enough to single them out.</p>
    <p>Across the 555 documents, just <strong>three</strong> everyday details were enough to uniquely identify <strong>98%</strong> of people; with their full set, every single document was unique. Deleting names treats the symptom — the real risk is the combination of small facts (the "mosaic effect").</p>
    <img src="../assets/overview_reidentification.png" alt="Three ordinary details identify 98% of people." />

    <h2>What I built</h2>
    <p>A redaction tool with two settings, so a firm can match effort to risk:</p>
    <ul>
      <li><strong>Redact</strong> — quickly removes the obvious identifiers (names, organisations, case numbers). Right when the worry is "the AI provider might store our text."</li>
      <li><strong>Anonymise</strong> — also blurs the everyday details (<em>Plovdiv → Bulgaria</em>, <em>47-year-old → in their 40s</em>) until a document can no longer be traced to one person. Right when the worry is a determined attacker piecing clues together.</li>
    </ul>
    <h2>Staying usable, not just safe — re-linkable labels</h2>
    <p>Stripping names protects privacy but can wreck usefulness: if everyone becomes a flat <strong>[name]</strong>, the AI can no longer tell who did what to whom. So the tool can instead swap each party for a stable label — <strong>Person A</strong>, <strong>Person B</strong>, <strong>Company A</strong> — and keep it consistent across the whole document.</p>
    <p>The piece that makes this work is <strong>co-reference</strong>: spotting when different wordings refer to the same person. Take a memo that reads <em>“Anya Kowalski … Ms Kowalski … she”</em> — all three are one individual. Co-reference links them so they all become the same <strong>Person A</strong>, every time it appears. The AI can then still reason that <em>“Person A negotiated with Person B and reported to the board”</em> — a faithful picture of the matter, with not a single real name in it.</p>
    <p>Without that step you get the worst of both worlds: either the same person picks up several different labels (the AI loses the thread), or you fall back to flat redaction (the AI can’t follow the parties at all).</p>
    <p><strong>Why a law firm should care:</strong></p>
    <ul>
      <li><strong>The AI’s answer stays useful.</strong> Because the relationships survive the swap, summaries, chronologies and “who agreed to what” still come back correct — you’re not trading away the reason you wanted AI in the first place.</li>
      <li><strong>No name ever leaves the building.</strong> Only the labelled text is sent to the AI. The firm keeps the key — a local “vault” — and translates the answer back to real names on its own machines, so privilege and client confidentiality are never put on the wire.</li>
      <li><strong>It’s reversible and auditable.</strong> The round-trip is lossless, and every redaction is logged, so a fee-earner can review, override and sign off — the human-in-the-loop that regulators and professional duties expect.</li>
    </ul>
    <p>Net effect: a firm gets the productivity of modern AI on its real files, while the confidential parts stay in-house. <a href="#" onclick="document.querySelector('[data-tab=results]')?.click();return false;">See a real round-trip in the results →</a></p>

    <blockquote>Bottom line: safely using AI on confidential legal text isn't just "find the names." It needs a second check — "could this still be traced back to someone?" — and a human in the loop. <a href="#" onclick="document.querySelector('[data-tab=technical]')?.click();return false;">See the technical write-up →</a></blockquote>
  </article>

<!-- TECHNICAL: data-science deep dive. Jargon OK, technical charts. -->
<template id="tab-technical">
  <article class="writeup">
    <h2>Dataset &amp; evaluation</h2>
    <p>Everything is grounded in the <strong>Text Anonymization Benchmark (TAB)</strong> — 1,268 European Court of Human Rights judgments, hand-annotated with entity type (<code>PERSON</code>, <code>ORG</code>, <code>LOC</code>, <code>DATETIME</code>, <code>QUANTITY</code>, <code>CODE</code>, <code>DEM</code>, <code>MISC</code>) <em>and</em> identifier role (<code>DIRECT</code> / <code>QUASI</code> / <code>NO_MASK</code>). That second axis is what makes the re-identification analysis possible.</p>
    <p>Every model — spaCy, HuggingFace, Presidio, the fine-tunes, the ensemble — is wrapped behind one interface, <code>text → [(start, end, tab_type, span_text)]</code>, and scored by the same span-level precision/recall/F1 (partial- and exact-match) on the 555-document test split. The numbers are therefore directly comparable.</p>

    <h2>Model bake-off</h2>
    <p>Off-the-shelf spaCy <code>en_core_web_trf</code> sets the baseline at <strong>0.566 partial-match F1</strong> (0.381 exact). The failures are structural, not random: <code>CODE</code> (case numbers) at <strong>0% recall</strong> — no such label in a newswire-trained model — and <code>ORG</code> precision at 0.18 (it fires on "the Court", "the Government").</p>
    <p>Fine-tuning <code>roberta-base</code> on TAB's label set wins at <strong>0.851 F1 (+28.5pp)</strong>, taking <code>CODE</code> recall 0 → 0.98. The gains concentrate exactly where TAB's labels diverge from newswire English.</p>
    <img src="../assets/phase_overall_f1.png" alt="Overall F1 across models — spaCy 0.57 up to RoBERTa 0.85, ensemble 0.55." />
    <img src="../assets/phase_f1_by_entity.png" alt="Per-entity-type F1 by model." />

    <h2>The mosaic effect</h2>
    <p>Mask every <code>DIRECT</code> identifier perfectly, fingerprint each document by its remaining <code>QUASI</code> mentions, and ask how often that fingerprint is unique. Result: <strong>1,268 / 1,268 documents are unique</strong> — 58% singled out by one quasi-identifier, 98% by three, none reaching k ≥ 5. The median document carries 25 distinct quasi-identifiers; their joint distribution is effectively a hash. <em>Anonymisation is a re-identification problem, not just an NER problem.</em></p>
    <img src="../assets/mosaic_reidentification.png" alt="Re-identification curve plus signature-size histogram." />

    <h2>The pipeline</h2>
    <ul>
      <li><strong>Redact</strong> (<code>LitePipeline</code>) — suppress <code>DIRECT</code> spans (NER + a regex pass for case numbers, IBANs, emails).</li>
      <li><strong>Anonymise</strong> (<code>ProPipeline</code>) — Redact plus an <em>iterate-until-safe</em> loop: a <code>MosaicScorer</code> measures k-anonymity against a haystack corpus, and quasi-identifiers are progressively generalised (Plovdiv → Bulgaria → Europe; 47 → ~40s → suppressed) until k ≥ target, else it falls back to full suppression.</li>
      <li><strong>Pseudonymisation</strong> — referential tokens (<code>[PERSON_A]</code>…) with a local vault and a <code>restore()</code> round-trip, so an LLM answer is re-identified locally and names never leave the firm.</li>
      <li>Every decision is recorded in a per-span <strong>audit log</strong> (source, confidence, role, generalisation level) for human review.</li>
    </ul>
    <img src="../assets/pipeline_architecture.svg" alt="Redact + Anonymise + pseudonymisation pipeline architecture diagram." />

    <h2>Honest negatives</h2>
    <p>Three results kept because the null <em>is</em> the finding:</p>
    <ul>
      <li><strong>LegalBERT ≈ RoBERTa</strong> (0.849 vs 0.851) — domain pretraining helps with vocabulary, not with a general-NER label set.</li>
      <li><strong>3-way ensemble backfired</strong> (0.553, below baseline) — union voting inherits Presidio's 0.14 <code>ORG</code> precision.</li>
      <li><strong>Coreference post-processor: +0.0001 recall</strong> — spaCy is already at the ceiling on the PERSON/ORG mentions a substring rule could recover.</li>
    </ul>
    <img src="../assets/ensemble_backfire.png" alt="Per-entity precision collapse of the 3-way ensemble." />

    <p>The backfire earned a <strong>follow-up</strong> — was it the <em>voting rule</em>, not the idea of ensembling? I cached each model's predictions over the test set once, then replayed every combiner against the same scorer (the replay reproduces the original 0.553 exactly, so it's trustworthy). Requiring agreement <em>does</em> recover the loss — union 0.553 → consensus 0.795 as precision climbs from 41% to 88% — so union-voting was indeed the culprit. <strong>But no combiner beats the single fine-tune (0.854).</strong> The reason is decisive: the fine-tune is the best model on <em>all eight</em> labels, so "route each label to its strongest model" picks the fine-tune every time — routing collapses to the model alone. Ensembling only pays when members are <em>complementary</em> (one wins where another loses); here one dominates everywhere, so even a second same-level fine-tune wouldn't help — it'd be correlated and still non-complementary. The single fine-tune is the ceiling.</p>
    <img src="../assets/phase6_combiner_comparison.png" alt="Combiner comparison — consensus recovers the union backfire (0.55→0.80) but no combiner clears the single fine-tune ceiling at 0.85." />

    <h2>Training &amp; caveats</h2>
    <ul>
      <li>Fine-tune: <code>roberta-base</code>, full 8-class BIO tagging, 384-token windows with 64-token overlap, span-deduped at inference.</li>
      <li>Partial-match scoring is lenient and uses greedy first-overlap matching; exact-match (0.78 for the fine-tune) is the strict boundary-sensitive number — a CRF head is the standard next step to close the gap.</li>
      <li>Mosaic fingerprints match on exact surface form; fuzzy matching would shift the crossing points but not the qualitative finding. The demo uses TAB itself as the haystack — a stand-in for a firm's own corpus.</li>
    </ul>
    <p><a href="https://github.com/WillCatt/Data-Anonymisation/blob/main/writeup/README.md" target="_blank" rel="noreferrer">Full write-up, all six phases →</a></p>
  </article>

    <h2>How it's measured</h2>
    <p>Every model in the project is scored the same way, so the numbers are directly comparable. For each document the model's predicted spans are matched against the benchmark's gold annotations at the character level:</p>
    <ul>
      <li><strong>True positive</strong> — predicted span has the right type <em>and</em> overlaps a gold span (<strong>partial</strong> match) or lands on the exact boundary (<strong>exact</strong> match).</li>
      <li><strong>Precision</strong> = of everything redacted, how much should have been. <strong>Recall</strong> = of everything that should have been redacted, how much was. <strong>F1</strong> = their harmonic mean.</li>
      <li>Only the identifiers the benchmark requires masking (<code>DIRECT</code> + <code>QUASI</code>) are scored. The test set is <a href="https://huggingface.co/datasets/mattmdjaga/text_anonymization_benchmark" target="_blank" rel="noreferrer">TAB</a> — 1,268 European Court of Human Rights cases, expert-annotated.</li>
    </ul>
    <p>For redaction, <strong>recall is the safety-critical number</strong> — a missed identifier is a leak, while a false positive just over-redacts. The model reaches <strong>86.4% recall</strong> overall.</p>

    <h2>What each identifier is</h2>
    <p>The benchmark tags eight categories of identifying information. The pipeline treats them in two groups: <strong>direct</strong> identifiers name someone outright and are <em>removed</em> by Redact mode; <strong>quasi</strong> identifiers are only identifying in combination, and are <em>generalised</em> by Anonymise mode rather than deleted.</p>
    <table class="defs">
      <thead><tr><th>Identifier</th><th>What it is</th><th>Examples</th><th>Handled by</th></tr></thead>

        <tr><td>ORG</td><td>Organisations: companies, institutions, courts-as-parties, law firms, chambers, hospitals.</td><td class="eg">“St. Andrew's Regional Hospital Trust”, “Patel &amp; Rosenthal LLP”</td><td class="role direct">DIRECT · Redact</td></tr>

      <div class="anon-out">Anya Kowalski of Meridian Capital Partners is the acquiring party; Tomás Ferreira, counsel to Halcyon Biotech GmbH, must secure board approval before Anya Kowalski proceeds.</div>
      <p class="run-note">The coreference holds: “Anya Kowalski” and the later “Ms Kowalski” both resolve to the same <code>[PERSON_A]</code>, so the round-trip is lossless and the document stays internally consistent. Real names never leave the building — only the tokenised text is sent out.</p>

<!-- WORKED EXAMPLES: real runs of the pipeline. Output generated by

<template id="tab-examples">
  <article class="writeup">
    <p>Three real documents run through the actual pipeline (the fine-tuned RoBERTa model — <em>not</em> the lighter model in the live demo). Output is verbatim; redaction tokens are highlighted. Each mode does something different.</p>

    <!-- RUN 1 — REDACT -->
    <div class="run">
      <h3><span class="run-mode">Redact</span> Strip the direct identifiers</h3>
      <p>The lighter mode. It removes anything that names someone outright — people, organisations, case and reference numbers — and leaves the rest of the text intact.</p>
      <div class="io-label">Input</div>
      <div class="anon-in">This memorandum concerns the grievance brought by Dr. Eleanor Whitcombe, a consultant cardiologist, against St. Andrew's Regional Hospital Trust. On 4 February 2021, Dr. Whitcombe lodged a formal complaint (Ref. HR-2021-0847) with the Trust's board, chaired by Mr. Harold Beecham. After internal mediation failed, the matter was referred to the Employment Tribunal in Manchester (Case no. 2402319/2021). Whitcombe was represented by Patel &amp; Rosenthal LLP; the Trust instructed Carrow Chambers.</div>
      <div class="io-label">Output — Redact</div>
      <div class="anon-out">This memorandum concerns the grievance brought by [PERSON], a consultant cardiologist, against [ORG]. On 4 February 2021, [PERSON] lodged a formal complaint (Ref. HR-[MISC]) with the Trust's board, chaired by [PERSON]. After internal mediation failed, the matter was referred to the Employment Tribunal in Manchester ([CODE]). [PERSON] was represented by [ORG]; the Trust instructed [ORG].</div>
      <p class="run-note">Caught all four people (including the bare surname “Whitcombe”), all three firms and the case number. Note two honest edges: it deliberately <em>keeps</em> quasi-identifiers like the date, “Manchester” and “consultant cardiologist” — that is the whole reason Anonymise exists — and the model clips the internal reference “HR-2021-0847” to “HR-[MISC]”, the kind of boundary miss the write-up’s exact-match caveat describes.</p>
    </div>

    <!-- RUN 2 — ANONYMISE -->
    <div class="run">
      <h3><span class="run-mode">Anonymise</span> Blur the fingerprint until it can’t be traced</h3>
      <p>Removing names is not enough (the mosaic effect). This mode also generalises the everyday details — broadening each one step at a time — until the document blends in with at least <strong>k = 5</strong> comparable matters instead of being unique.</p>
      <div class="io-label">Input</div>
      <div class="anon-in">The applicant, Maria Petrova, is a 47-year-old Bulgarian national living in Plovdiv. On 12 March 2018 she filed a complaint (Application no. 12345/67) against the Sofia District Court alleging discrimination on grounds of her Roma ethnicity. Maria has been employed as a nurse since 2010 and is the mother of three children.</div>
      <div class="io-label">Output — Anonymise</div>
      <div class="anon-out">The applicant, [PERSON], is a [DEM] European national living in Bulgaria. On 2018 she filed a complaint ([CODE]) against the [ORG] alleging discrimination on grounds of her ethnic minority ethnicity. [PERSON] has been employed as a [DEM] since 2010 and is the mother of three [DEM].</div>
      <p style="margin-bottom:6px"><strong>Re-identification risk:</strong> <code>k = 1</code> (unique) → <code>k = 5</code> after 1 generalisation step.</p>
      <div class="io-label">How each detail was broadened (real generalisation ladder)</div>
      <ul class="ladder">
        <li><span class="lt">LOC</span> &nbsp;Plovdiv → <strong>Bulgaria</strong> → Europe → [LOC]</li>
        <li><span class="lt">DEM</span> &nbsp;Bulgarian → <strong>European</strong> → [DEM]</li>
        <li><span class="lt">DATETIME</span> &nbsp;12 March 2018 → <strong>2018</strong> → 2010s → [DATETIME]</li>
        <li><span class="lt">DEM</span> &nbsp;Roma → <strong>ethnic minority</strong> → [DEM]</li>
        <li><span class="lt">DEM</span> &nbsp;47-year-old → [DEM] (no safe middle band — suppressed)</li>
      </ul>
      <p class="run-note">The mode stops at the <em>first</em> level that reaches k = 5, so it blurs rather than deletes where it can (Plovdiv → Bulgaria, not “[LOC]”). The haystack here is a small simulated firm corpus of similar matters; against the full benchmark this document is unique at every level, so Anonymise instead suppresses everything — the project’s headline finding.</p>
    </div>

    <!-- RUN 3 — PSEUDONYMISE -->
    <div class="run">
      <h3><span class="run-mode">Pseudonymise</span> Re-linkable labels, names never leave the building</h3>
      <p>Instead of flat <code>[PERSON]</code> tags, each party gets a stable label — <code>[PERSON_A]</code>, <code>[ORG_A]</code> — so an external AI can still follow who did what. The real names sit in a local vault; the AI’s answer is translated back here.</p>
      <div class="io-label">Input</div>
      <div class="anon-in">Following preliminary talks, Anya Kowalski of Meridian Capital Partners met with Tomás Ferreira, general counsel of Halcyon Biotech, to negotiate terms. Kowalski proposed that Meridian Capital Partners acquire a controlling stake in Halcyon Biotech; Ferreira undertook to consult the board. A follow-up call between Ms Kowalski and Mr Ferreira was scheduled for the following week.</div>
      <div class="io-label">Output — safe to send to an external LLM</div>
      <div class="anon-out">Following preliminary talks, [PERSON_A] of [ORG_A] met with [PERSON_B], general counsel of [ORG_B], to negotiate terms. [PERSON_A] proposed that [ORG_A] acquire a controlling stake in [ORG_B]; [PERSON_B] undertook to consult the board. A follow-up call between [PERSON_A] and [PERSON_B] was scheduled for the following week.</div>
      <div class="io-label">Vault — kept locally, never sent out</div>
      <table class="vault">
        <tr><td>[PERSON_A]</td><td>Anya Kowalski</td></tr>
        <tr><td>[ORG_A]</td><td>Meridian Capital Partners</td></tr>
        <tr><td>[PERSON_B]</td><td>Tomás Ferreira</td></tr>
        <tr><td>[ORG_B]</td><td>Halcyon Biotech</td></tr>
      </table>
      <div class="io-label">The LLM’s answer comes back tokenised…</div>
      <div class="anon-out">[PERSON_A] of [ORG_A] is the acquirer; [PERSON_B] represents the target [ORG_B] and must obtain board approval before [PERSON_A] proceeds.</div>
      <div class="io-label">…and restore() puts the real names back, locally</div>
      <div class="anon-out">Anya Kowalski of Meridian Capital Partners is the acquirer; Tomás Ferreira represents the target Halcyon Biotech and must obtain board approval before Anya Kowalski proceeds.</div>
      <p class="run-note">Note the coreference: every mention of Kowalski — “Kowalski”, “Ms Kowalski” — maps to the same <code>[PERSON_A]</code>, so the document stays internally consistent and the round-trip is lossless.</p>
    </div>

    <h2>Structure</h2>
    <pre class="tree"><code>src/anonymisation/
├── data.py  mapping.py        TAB loader + spaCy↔TAB label mapping
├── evaluation.py              span-level P/R/F1 (the shared scorer)

    ├── base.py                detect spans → classify role → redact
    ├── lite.py  pro.py        the two pipeline variants
    ├── scorer.py              MosaicScorer (iterate-until-safe)
    ├── generalization.py      per-type QUASI generalisation rules
    └── pseudonymise.py        referential tokens + restore()
notebooks/ · phase2..phase6/   experiments: baseline → fine-tune → ensemble
demo/ · spaces/                Gradio app + HuggingFace Space bundle
tests/                         pytest suite (pure-logic modules)</code></pre>

    <h2>The predictor contract</h2>
    <p>Every NER backend conforms to one interface, so the same evaluator and both pipelines drive all of them:</p>
    <pre><code class="lang-python"># text -> [(start_char, end_char, tab_type, span_text), ...]
SpanPredictor = Callable[[str], List[Tuple[int, int, str, str]]]</code></pre>

    <h2>Anonymise (ProPipeline): iterate-until-safe</h2>
    <pre><code class="lang-python"># suppress DIRECT spans, then generalise QUASI until k-anonymity is met
for level in range(1, MAX_LEVEL + 1):
    for s in quasi_spans:
        s.replacement = generalize(s.entity_type, s.text, level)
    if scorer.k_for(signature(quasi_spans)) >= self.k_target:
        break                      # safe — stop generalising
# else: fall back to full suppression</code></pre>

    <h2>Round-trip pseudonymisation</h2>
    <pre><code class="lang-python">ps = Pseudonymiser()
ps.token_for("PERSON", "Maria Petrova")   # -> "[PERSON_A]"
ps.token_for("PERSON", "Mrs Petrova")     # -> "[PERSON_A]"  (coref)
# ...send tokenised text to the LLM, then locally:
restore(llm_answer, ps.vault)             # tokens -> real names</code></pre>
