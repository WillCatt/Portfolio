<!-- OVERVIEW: stakeholder-facing. Plain language, simple charts. -->
<template id="tab-overview">
  <article class="writeup">
    <h2>The problem</h2>
    <p>A single-shot Q&amp;A bot (like its sibling <a href="quoteguard.html">QuoteGuard</a>) does one retrieval and writes one answer. That works for one fact. Real policy questions are rarely one fact: <em>"Is flood covered, and if a storm hits in the same event, how many excesses apply?"</em> is three questions wearing a trench coat. Ask a single pass and it usually answers the loudest part and skims the rest, sometimes asserting something the document never says.</p>
    <p>The interesting question is whether handing the job to a small <strong>team of specialised agents</strong> (one to plan, several to research, one to check the work) produces a better-grounded answer than one model doing it all at once, or whether it just adds moving parts and cost for the same result.</p>

    <h2>What I built</h2>
    <p>PolicyDesk is a research desk built on <strong>LangGraph</strong>. Given a question about the Allianz Business PDS, it runs a small org chart:</p>
    <ul>
      <li>A <strong>planner</strong> splits the question into the minimal set of sub-questions.</li>
      <li>A <strong>researcher</strong> is spun up for each sub-question (in parallel) to retrieve evidence and draft a page-cited answer.</li>
      <li>A <strong>critic</strong> reads every draft against its cited evidence and sends weak ones back for revision — a loop, capped so it can't spin forever.</li>
      <li>An <strong>editor</strong> merges the verified findings into one cited brief; guardrails sit on the way in and out.</li>
    </ul>
    <p>It reuses QuoteGuard's corpus and BM25 retrieval on purpose, so I could <strong>measure the multi-agent desk head-to-head against plain single-shot RAG</strong>: same model, same retriever, with only the orchestration changing.</p>

    <h2>Does multi-agent actually win?</h2>
    <p>It depends what you mean by win. Two patterns hold up across 45 questions. The desk is <strong>more reliably grounded</strong>: 91% of its answers cite a real, retrieved page, against 82% for a single pass, and the gap is widest on simple lookups (91% vs 77%). But it is <strong>no more complete</strong>: gold-page coverage is a dead heat (36% vs 36%). So the team of agents earns its keep on citation discipline, not on finding more of the answer — at least at this model size.</p>
    <img src="../assets/policydesk/quality_by_type.png" alt="Multi-agent is better grounded than single-shot; gold-page coverage is tied." />
    <a class="deeper" href="#" onclick="document.querySelector('[data-tab=results]')?.click();return false;">See the full comparison →</a>

    <h2>A lesson in sample size</h2>
    <p>An early 15-question pilot showed a dramatic split: +26 points of coverage for the desk on multi-part questions, −25 on simple ones. Tripling the eval to 45, that swing <em>washed out</em> — it was small-sample noise. The grounding edge survived; the coverage swing did not. A working reminder to trust a result only at a credible sample size (its sibling <a href="quoteguard.html">QuoteGuard</a> taught me the same lesson with a retrieval metric).</p>

    <h2>Does the critic earn its keep?</h2>
    <p>A little. The critic catches drafts that cite nothing or cite a page they never read, and bounces them back; across the eval that nudges the share of grounded sub-answers from 74% to 79%. Most of the protection comes from a cheap deterministic check that blocks fabricated citations before the LLM critic even runs. The model-based revision adds a few points on top, not a transformation.</p>
    <a class="deeper" href="#" onclick="document.querySelector('[data-tab=technical]')?.click();return false;">How the graph and the critic loop work →</a>

    <blockquote>Multi-agent here buys reliability, not completeness, at roughly seven times the cost. The practical answer is to route by complexity: a built-in classifier sends simple questions to a single pass and keeps the desk for compound ones, holding the grounding edge while cutting the cost by ~40%. <a href="#" onclick="document.querySelector('[data-tab=app]')?.click();return false;">Watch the desk run →</a></blockquote>
  </article>
</template>

<!-- TECHNICAL: deep dive. Jargon OK. -->
<template id="tab-technical">
  <article class="writeup">
    <h2>The task &amp; corpus</h2>
    <p>Same document as QuoteGuard: the <strong>Allianz Business Insurance Pack PDS</strong>, 100 pages, parsed (with docling) into 138 section-aware chunks that each carry a heading path and page numbers. What changes is the question shape: compound questions with several parts, where a single retrieval-then-answer pass under-serves at least one of them.</p>

    <h2>Why LangGraph (and why a framework at all)</h2>
    <p>I've hand-rolled agent loops before; <a href="touchline.html">Touchline</a> is a from-scratch tool-use loop. Doing it by hand teaches you the internals, and which parts are most fiddly. Three of those are what a graph framework makes declarative:</p>
    <ul>
      <li><strong>Typed shared state with reducers.</strong> When several researchers write back at once, you need a defined merge. LangGraph's annotated state channels do this; I'd otherwise be hand-managing concurrent dict updates.</li>
      <li><strong>Map-reduce fan-out.</strong> The planner emits N sub-questions and the graph spawns one researcher each via LangGraph's <code>Send</code> API, fanning back into a single critic. No manual task pool.</li>
      <li><strong>A cyclic, capped loop.</strong> critic ⇄ revise is a real cycle with an iteration limit and a conditional exit — a few lines of edges instead of a hand-written while-loop with its own bookkeeping.</li>
    </ul>
    <p>State is checkpointed with a <code>MemorySaver</code>, so every step is inspectable and the run is resumable. That's the case <em>for</em> a framework: the orchestration becomes the readable part, and the agent prompts become what you iterate on.</p>

    <h2>The graph</h2>
    <pre class="tree"><code>guard_in → planner ─┬─(Send)→ research(sub-q₁) ─┐
                    ├──────→ research(sub-q₂) ─┼→ critic ⇄ revise → synthesiser → guard_out
                    └──────→ research(sub-q₃) ─┘   └── capped revision loop ──┘</code></pre>
    <ul>
      <li><strong>guard_in</strong> — refuses personal advice, pricing and prompt-injection up front (a thin port of QuoteGuard's input guards); a block short-circuits straight to the end.</li>
      <li><strong>planner</strong> — a supervisor that returns JSON sub-questions, tuned to prefer <em>one</em> sub-question unless the question clearly has several parts.</li>
      <li><strong>research</strong> — fan-out worker: BM25-retrieve the top few chunks for its sub-question, draft a short answer that cites pages and uses the excerpts only.</li>
      <li><strong>critic</strong> — a deterministic grounding check (are the cited pages real and present?) <em>and</em> one LLM faithfulness pass over all drafts; the deterministic verdict overrides the LLM's.</li>
      <li><strong>revise</strong> — re-drafts only the flagged sub-questions, given the critic's reason; loops back to the critic until clean or the cap (1–2) is hit.</li>
      <li><strong>synthesiser → guard_out</strong> — merge into one cited brief; a final grounding check + disclaimer.</li>
    </ul>

    <h2>The evaluation</h2>
    <p>The point of reusing QuoteGuard's retrieval is a clean control. The <strong>baseline</strong> is single-shot RAG: retrieve once for the whole question, answer once, on the same model (<code>llama-3.1-8b</code> on Ollama), same BM25, same corpus. The only variable is orchestration. 45 questions (22 simple, 23 multi-part), tagged <strong>simple</strong> (single-fact lookups drawn from QuoteGuard's gold set) or <strong>multi-part</strong> (each pairing two or three facts, with gold pages = the union). All rates carry <strong>bootstrap 95% CIs</strong>.</p>
    <p>The metrics are objective: <strong>grounded</strong> (the answer cites at least one page and every cited page was in the retrieved set, so no invented citations); <strong>gold-page coverage</strong> (the fraction of the question's gold supporting pages the answer cites); and <strong>cost</strong> (LLM calls, tokens, wall-clock). The critic's effect is measured within each run by comparing the grounding of the first-pass drafts to the post-loop drafts.</p>

    <h2>Beyond the core graph</h2>
    <p>Three things built on the same graph, each a small project in its own right.</p>

    <h3>Route by complexity — the finding, as code</h3>
    <p>The eval says the desk only helps on compound questions, so <code>router.py</code> makes that a switch: a zero-cost heuristic classifies the question (compound when a clause after an "and" carries its own interrogative head) and dispatches simple ones to single-shot, compound ones to the desk. Over the 45 questions it holds the desk's grounding (84%) and coverage (38%) at <strong>4.3 LLM calls per answer instead of 7.4</strong> — about a 40% cut. The classifier scores 100% on this labelled set, but that's the set it was tuned against; a learned classifier is the honest production version.</p>

    <h3>A second framework: PydanticAI</h3>
    <p>The brief named LangGraph <em>or</em> PydanticAI, so the planner is also built on <strong>PydanticAI</strong> (<code>planner_pydantic.py</code>) as a drop-in node. Where the LangGraph version hand-parses JSON with a fallback, the PydanticAI <code>Agent</code> returns a typed, validated <code>Plan</code> with automatic retries (in <code>PromptedOutput</code> mode, since 8B models handle tool-calling poorly). Head-to-head over 45 questions both emit valid structured output 100% of the time and agree on the decomposition 91% of the time; decomposition accuracy is comparable (58% vs 67%, within noise). The win isn't accuracy, it's a typed, self-validating agent in a fraction of the code.</p>

    <h3>Human-in-the-loop &amp; tracing</h3>
    <p><code>build_graph(human_in_loop=True)</code> inserts a LangGraph <code>interrupt</code> before release: the run pauses with the draft brief, the checkpointer holds the state, and a reviewer resumes with <code>Command(resume={"approved": True})</code> (see <code>examples/hitl_demo.py</code>) — the sign-off step a regulated deployment needs. And because every node is a LangChain/LangGraph runnable, setting <code>LANGSMITH_TRACING=true</code> traces each run end-to-end with no code change.</p>

    <h2>What surprised me</h2>
    <ul>
      <li><strong>The dramatic result was sample noise.</strong> A 15-question pilot showed a +26 / −25 coverage swing by question type. At 45 it vanished (coverage is tied); only the grounding gap survived. The cautionary half of data science: a striking number at small n is a hypothesis, not a finding.</li>
      <li><strong>The planner over-decomposes.</strong> An early version split a flat yes/no ("is flood covered?") into four sub-questions, inflating cost and losing the gold page a single pass nailed. A firmer prompt with worked examples curbed it, but the tendency lingers on borderline questions, and it's why the desk doesn't pay off on simple lookups.</li>
      <li><strong>The critic helps a little, and the cheap check does most of it.</strong> The critic ⇄ revise loop lifts grounded sub-answers 74% → 79%; the deterministic citation check (cited pages must be real and retrieved) blocks fabrications before the LLM critic runs. The cap is load-bearing — on some questions the critic keeps flagging the same draft. A citation-presence proxy is also game-able: it rewards a citation that's real, not necessarily one that supports the claim.</li>
      <li><strong>An 8B model is a shaky grounder.</strong> Inherited from QuoteGuard: the local model paraphrases well but mis-cites. The deterministic check catches fabricated pages; it can't make a weak model strong.</li>
    </ul>

    <h2>Caveats</h2>
    <ul>
      <li>45 questions is still a modest set; the CIs are wide, so the grounding gap and the coverage tie are directions, not precise effect sizes.</li>
      <li>Single document, single product line, single local model. The architecture generalises; the numbers are specific to this PDS and this 8B model.</li>
      <li>Grounding here means "cited, real, present", a necessary-not-sufficient proxy for faithfulness. A proper NLI/judge faithfulness score is future work.</li>
    </ul>

    <h2>From prototype to production</h2>
    <p>The router, the human-in-the-loop gate and tracing are built (above); the remaining gaps:</p>
    <ul>
      <li><strong>A learned complexity classifier.</strong> The router's heuristic is good on this set but tuned to it; production wants a small trained classifier (or a calibrated planner-count threshold) that generalises to wild questions.</li>
      <li><strong>Stronger reasoning + retrieval.</strong> Swap in a frontier model (a one-flag <code>ChatAnthropic</code> change) and QuoteGuard's hybrid+rerank retriever; the 8B grounding ceiling is the current bottleneck, and likely where coverage finally separates.</li>
      <li><strong>The full guardrail pipeline.</strong> <code>guard_in</code>/<code>guard_out</code> are thin ports; a real deployment would wire QuoteGuard's complete input/output guardrails behind the same nodes.</li>
      <li><strong>A persistent store.</strong> Swap <code>MemorySaver</code> for a durable checkpointer so paused (human-in-the-loop) runs survive a restart, and runs stay auditable.</li>
    </ul>
    <p><a href="https://github.com/WillCatt/PolicyDesk" target="_blank" rel="noreferrer">Full code, the graph, and the eval harness →</a></p>
  </article>

    <h2>The graph, in one function</h2>
    <p>The whole orchestration is declarative: nodes, a <code>Send</code> fan-out from the planner, and a conditional edge that forms the critic ⇄ revise cycle.</p>
    <pre><code class="lang-python">def build_graph(checkpointer=None):
    g = StateGraph(DeskState)
    for name, fn in [("guard_in", guard_in), ("planner", planner), ("research", research),
                     ("critic", critic), ("revise", revise),
                     ("synthesizer", synthesizer), ("guard_out", guard_out)]:
        g.add_node(name, fn)
    g.add_edge(START, "guard_in")
    g.add_conditional_edges("guard_in", _after_guard_in, {"blocked": END, "ok": "planner"})
    g.add_conditional_edges("planner", _fan_out_research, ["research"])   # Send map-reduce
    g.add_edge("research", "critic")                                       # fan back in
    g.add_conditional_edges("critic", _after_critic, {"revise": "revise", "synthesize": "synthesizer"})
    g.add_edge("revise", "critic")                                         # the cycle
    g.add_edge("synthesizer", "guard_out")
    g.add_edge("guard_out", END)
    return g.compile(checkpointer=checkpointer or MemorySaver())</code></pre>

    <h2>Fan-out + the capped loop</h2>
    <pre><code class="lang-python">def _fan_out_research(state):                 # one researcher per sub-question
    return [Send("research", {"question": state["question"], "subquestion": sq})
            for sq in state["subquestions"]]

def _after_critic(state):                     # loop until clean or the cap is hit
    cap = state.get("max_revisions", settings.max_revisions)
    flagged = any(c["verdict"] == "revise" for c in state.get("critiques", []))
    return "revise" if flagged and state.get("revision_count", 0) < cap else "synthesize"</code></pre>

    <p>A cheap, exact grounding check runs first; the LLM faithfulness verdict can't rescue a draft that cites a page it never retrieved.</p>
    <pre><code class="lang-python">g = check_grounding(draft, evidence_pages)        # cited ⊆ retrieved, and ≥1 citation
if not g.grounded:
    verdict = "revise"                             # deterministic override
    reason = "No page citation." if not g.has_citation else f"Cites pages not in evidence {g.unsupported_pages}."
else:
    verdict = "revise" if llm_verdict == "revise" else "pass"</code></pre>

    <h2>Routing by complexity (zero-cost classifier)</h2>
    <p>A clause after an "and" that carries its own interrogative head marks a compound question; simple ones skip the desk.</p>
    <pre><code class="lang-python">_HEADS = r"\b(what|which|how|when|where|who|does|do|is|are|can|must|will|until|within)\b"

def classify_complexity(question: str) -> str:
    parts = re.split(r",?\s+and\s+|\s*;\s*", question.lower())
    if len(parts) >= 2 and any(re.search(_HEADS, p) for p in parts[1:]):
        return "compound"
    return "simple"

def route_answer(q):
    return run_baseline(q) if classify_complexity(q) == "simple" else run_desk(q)</code></pre>

    <h2>The planner on PydanticAI (typed, validated)</h2>
    <p>The same job as the LangGraph planner node, but the output is a validated <code>Plan</code> with retries — no hand-rolled JSON parsing or fallback.</p>
    <pre><code class="lang-python">class Plan(BaseModel):
    subquestions: list[str] = Field(..., min_length=1)

agent = Agent(OpenAIChatModel(settings.ollama_model, provider=OpenAIProvider(base_url=OLLAMA_V1, api_key="ollama")),
              output_type=PromptedOutput(Plan),          # schema-in-prompt; 8B models handle this, not tool-calls
              system_prompt=PLANNER_SYSTEM, retries=3)

plan: Plan = agent.run_sync(f"User question: {q}").output   # typed + validated, or raises after retries</code></pre>

    <h2>Human-in-the-loop: pause, approve, resume</h2>
    <p>One LangGraph <code>interrupt</code> turns the graph into an approval workflow; the checkpointer holds the paused state between calls.</p>
    <pre><code class="lang-python">def human_approval(state):                        # node wired in by build_graph(human_in_loop=True)
    review = interrupt({"brief": state["final_brief"], "subquestions": state["subquestions"]})
    return {} if review.get("approved") else {"final_brief": WITHHELD, "status": "withheld"}

result = graph.invoke(inputs, cfg)                 # ... runs until the interrupt, then pauses
graph.invoke(Command(resume={"approved": True}), cfg)   # reviewer resumes from the checkpoint</code></pre>
